<!DOCTYPE html>
<html lang="he" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>משחק: זיכרון | WHITEBOARD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --navy:#253E7A; --navy-dark:#1a2f5e; --cyan:#38C4F2; --cyan-light:rgba(56,196,242,0.13);
  --pink:#F05680; --pink-light:rgba(240,86,128,0.12); --green:#7DC57A; --green-light:rgba(125,197,122,0.12);
  --yellow:#EAD654; --amber:#F59E0B;
  --font:'Heebo',sans-serif; --font-brand:'Fredoka',sans-serif;
  --r-xs:6px; --r-sm:10px; --r-md:16px; --r-lg:22px;
  --strip-w:52px;
  --bg:#EBF3FB;
  --surface:#FFFFFF; --surface-2:#F4F9FF; --surface-3:#edf4ff;
  --border:rgba(37,62,122,0.1); --border-mid:rgba(37,62,122,0.16);
  --text-main:#1a2f5e; --text-sub:rgba(37,62,122,0.52); --text-xs:rgba(37,62,122,0.35);
  --sh-sm:0 2px 8px rgba(37,62,122,0.08); --sh-md:0 4px 20px rgba(37,62,122,0.12);
}
[data-theme="dark"] {
  --bg:#0c1422; --surface:#131e35; --surface-2:#192740; --surface-3:#1e2e48;
  --border:rgba(255,255,255,0.07); --border-mid:rgba(255,255,255,0.12);
  --text-main:#dde5f5; --text-sub:rgba(221,229,245,0.48); --text-xs:rgba(221,229,245,0.28);
  --sh-sm:0 2px 12px rgba(0,0,0,0.3); --sh-md:0 6px 24px rgba(0,0,0,0.4);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text-main);
  height:100dvh;display:flex;flex-direction:column;overflow:hidden;
  transition:background .25s,color .25s;user-select:none;}

/* ══ TOPBAR ══ */
.topbar{
  height:48px;background:var(--surface);border-bottom:1px solid var(--border-mid);
  display:flex;align-items:center;justify-content:space-between;padding:0 18px;
  flex-shrink:0;box-shadow:var(--sh-sm);z-index:30;transition:background .25s,border-color .25s;
}
.bc{display:flex;align-items:center;gap:5px;font-size:12.5px;flex-wrap:wrap;}
.bc a{color:var(--text-sub);text-decoration:none;transition:color .15s;}
.bc a:hover{color:var(--text-main);}
.bc-sep{color:var(--text-xs);}
.bc-cur{color:var(--text-main);font-weight:700;}
.tb-right{display:flex;align-items:center;gap:7px;}
.ib{width:32px;height:32px;border-radius:var(--r-xs);border:1px solid var(--border);
  background:var(--surface);display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-sub);transition:all .18s;}
.ib:hover{background:var(--cyan-light);color:var(--navy);border-color:var(--cyan);}
.ib svg{width:14px;height:14px;}
.icon-sun{display:none;}.icon-moon{display:block;}
[data-theme="dark"] .icon-sun{display:block;}[data-theme="dark"] .icon-moon{display:none;}

/* ══ BODY LAYOUT ══ */
.game-body{flex:1;display:flex;overflow:hidden;}

/* ══ RIGHT NAVY STRIP (student 52px) ══ */
.right-strip{
  width:var(--strip-w);flex-shrink:0;
  background:var(--navy-dark);
  display:flex;flex-direction:column;align-items:center;
  z-index:20;
}
.rs-logo{
  width:100%;display:flex;align-items:center;justify-content:center;
  padding:10px 0 8px;border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0;
}
.rs-logo svg{width:28px;height:28px;}
.rs-icons{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;}
.rs-btn{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .18s;position:relative;flex-shrink:0;
  background:transparent;border:none;color:rgba(255,255,255,0.5);padding:0;
}
.rs-btn:hover{background:rgba(255,255,255,0.1);color:#fff;}
.rs-btn.active{background:rgba(56,196,242,0.2);color:var(--cyan);}
.rs-btn svg{width:17px;height:17px;}
.rs-btn::after{
  content:attr(data-tip);position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);
  background:rgba(0,0,0,.8);color:#fff;font-family:var(--font);font-size:11px;font-weight:700;
  padding:3px 8px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:100;
}
.rs-btn:hover::after{opacity:1;}
.rs-bottom{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 0;border-top:1px solid rgba(255,255,255,0.1);flex-shrink:0;
}
.rs-profile{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,#38C4F2,#253E7A);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;color:#fff;cursor:pointer;
  border:2px solid rgba(255,255,255,0.2);transition:border-color .18s;flex-shrink:0;
}
.rs-profile:hover{border-color:rgba(255,255,255,0.5);}

/* ══ MAIN GAME AREA ══ */
.main-area{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:12px 16px;background:var(--bg);transition:background .25s;
  position:relative;overflow:hidden;
}

/* ── Game Header ── */
.game-header{
  display:flex;align-items:center;justify-content:center;gap:24px;
  margin-bottom:10px;flex-shrink:0;width:100%;max-width:560px;
}
.game-title{font-family:var(--font-brand);font-size:20px;font-weight:700;color:var(--navy);}
[data-theme="dark"] .game-title{color:var(--cyan);}
.stats-row{display:flex;align-items:center;gap:16px;font-size:13px;color:var(--text-sub);font-weight:600;}
.stats-row span{display:flex;align-items:center;gap:4px;}
.stats-row b{color:var(--cyan);font-family:var(--font-brand);}

/* ── Card Grid ── */
.card-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  max-width:480px;
  width:100%;
}
.memory-card{
  aspect-ratio:5/6;
  perspective:1000px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.memory-card .card-inner{
  position:relative;width:100%;height:100%;
  transition:transform 0.3s ease-out;
  transform-style:preserve-3d;
}
.memory-card.flipped .card-inner{transform:rotateY(180deg);}
.memory-card .card-face{
  position:absolute;inset:0;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 6px;overflow:hidden;
}
/* Back face */
.card-back{
  background:linear-gradient(145deg,#253E7A,#1a2f5e);
  box-shadow:var(--sh-sm);border:1.5px solid rgba(255,255,255,0.06);
}
.card-back svg{width:36px;height:36px;opacity:0.15;}
.card-back img{width:60%;max-width:80px;opacity:1;object-fit:contain;}
.card-back:hover{box-shadow:0 4px 16px rgba(37,62,122,0.2);border-color:rgba(56,196,242,0.3);}
/* Front face */
.card-front{
  transform:rotateY(180deg);
  border:1.5px solid var(--border);
  box-shadow:var(--sh-sm);
}
.card-front .card-type-label{
  font-size:9px;font-weight:700;
  position:absolute;top:6px;right:8px;
  letter-spacing:0.3px;
}
.card-front .card-text{
  font-size:13px;font-weight:700;color:var(--text-main);
  text-align:center;line-height:1.35;word-break:break-word;
  padding:0 4px;
}
/* Clue type */
.card-clue .card-front{
  background:rgba(56,196,242,0.08);
  border-right:3px solid var(--cyan);
}
.card-clue .card-type-label{color:var(--cyan);}
/* Answer type */
.card-answer .card-front{
  background:rgba(240,86,128,0.06);
  border-right:3px solid var(--pink);
}
.card-answer .card-type-label{color:var(--pink);}
/* Image card */
.card-front .card-img{
  width:100%;height:100%;object-fit:cover;border-radius:8px;
}
/* Matched */
.memory-card.matched .card-front{
  border-color:var(--green) !important;
  opacity:0.85;
}
.memory-card.matched .match-badge{
  display:flex;
}
.match-badge{
  display:none;
  position:absolute;top:4px;left:4px;
  width:18px;height:18px;border-radius:50%;
  background:var(--green);
  align-items:center;justify-content:center;
}
.match-badge svg{width:10px;height:10px;color:#fff;}
/* Green pulse */
@keyframes green-pulse{
  0%{box-shadow:0 0 0 0 rgba(125,197,122,0.5)}
  70%{box-shadow:0 0 0 10px rgba(125,197,122,0)}
  100%{box-shadow:0 0 0 0 rgba(125,197,122,0)}
}
.memory-card.matched .card-front{animation:green-pulse 0.6s ease;}
/* Shake on wrong */
@keyframes card-shake{
  0%,100%{transform:rotateY(180deg) translateX(0)}
  20%{transform:rotateY(180deg) translateX(-6px)}
  40%{transform:rotateY(180deg) translateX(6px)}
  60%{transform:rotateY(180deg) translateX(-4px)}
  80%{transform:rotateY(180deg) translateX(4px)}
}
.memory-card.wrong .card-inner{animation:card-shake 0.4s ease;}
.memory-card.wrong .card-front{border-color:var(--pink) !important;background:rgba(240,86,128,0.1) !important;}

/* ── BOARDi mascot ── */
.boardi-mascot{
  position:absolute;bottom:10px;left:16px;width:144px;height:144px;
  pointer-events:none;z-index:10;
}
.boardi-mascot img{width:100%;height:100%;object-fit:contain;}

/* ── Result Overlay ── */
#result{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);
  flex-direction:column;align-items:center;justify-content:center;
  gap:14px;z-index:100;padding:28px 20px;
}
#result.show{display:flex;}
.result-card{
  background:var(--surface);border-radius:var(--r-md);padding:32px 28px;
  box-shadow:var(--sh-md);border:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;gap:14px;
  max-width:380px;width:100%;transition:background .25s;
}
.result-mascot{width:100px;height:100px;}
.result-mascot img{width:100%;height:100%;object-fit:contain;}
#result-title{font-family:var(--font-brand);font-size:1.6rem;text-align:center;line-height:1.2;color:var(--text-main);}
.stars-row{display:flex;gap:8px;justify-content:center;}
.star-icon{width:36px;height:36px;color:var(--border-mid);transition:color .3s,transform .3s;}
.star-icon.earned{color:var(--yellow);transform:scale(1.15);}
@keyframes star-pop{0%{transform:scale(0) rotate(-30deg)}60%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1.15) rotate(0)}}
.star-icon.earned.anim{animation:star-pop 0.4s ease forwards;}
.result-stats{font-size:13px;color:var(--text-sub);text-align:center;line-height:2;}
.result-stats b{color:var(--cyan);}
.btn-primary{
  background:var(--navy);color:#fff;border:none;padding:12px 32px;
  border-radius:50px;cursor:pointer;font-family:var(--font-brand);font-size:1.1rem;font-weight:600;
  box-shadow:0 4px 16px rgba(37,62,122,0.25);transition:all .2s;
}
.btn-primary:hover{background:var(--cyan);box-shadow:0 6px 24px rgba(56,196,242,0.35);transform:scale(1.04);}

/* ── Confetti ── */
.confetti{position:fixed;top:-10px;width:8px;height:8px;border-radius:2px;z-index:150;pointer-events:none;animation:confetti-fall 2.5s ease-out forwards;}
@keyframes confetti-fall{
  0%{transform:translateY(0) rotate(0);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* ── Mobile ── */
@media(max-width:640px){
  .game-header{flex-direction:column;gap:6px;}
  .card-grid{gap:6px;max-width:340px;}
  .card-front .card-text{font-size:11px;}
  .game-title{font-size:17px;}
  .stats-row{font-size:11.5px;gap:10px;}
}
</style>
</head>

    <div class="result-stats" id="result-stats"></div>
    <button class="btn-primary" id="replay-btn">שחק שוב</button>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   MEMORY GAME — WHITEBOARD
   ══════════════════════════════════════════ */

const PAIRS = [
  { clue:'קומפוזיציה', answer:'סידור אלמנטים בעיצוב' },
  { clue:'טיפוגרפיה', answer:'אומנות עיצוב האותיות' },
  { clue:'פלטה', answer:'סט צבעים לעיצוב' },
  { clue:'ניגודיות', answer:'הבדל בין בהיר לכהה' },
  { clue:'גריד', answer:'רשת לסידור אלמנטים' },
  { clue:'וקטור', answer:'גרפיקה שלא מאבדת איכות' },
  { clue:'לוגו', answer:'סמל שמייצג מותג' },
  { clue:'מרווח', answer:'חלל לבן בין אלמנטים' },
];

// ── State
let cards = [];
let firstPick = null;
let secondPick = null;
let lockBoard = false;
let matchedCount = 0;
let attempts = 0;
let timerInterval = null;
let seconds = 0;
const totalPairs = PAIRS.length;

// ── Init
function initGame() {
  matchedCount = 0;
  attempts = 0;
  seconds = 0;
  firstPick = null;
  secondPick = null;
  lockBoard = false;
  clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('attemptsDisplay').textContent = '0';
  document.getElementById('pairsDisplay').textContent = '0';
  document.getElementById('totalPairs').textContent = totalPairs;
  document.getElementById('timerDisplay').textContent = '00:00';
  document.getElementById('result').classList.remove('show');

  // Build card array: each pair produces 2 cards
  cards = [];
  PAIRS.forEach((p, i) => {
    cards.push({ pairId: i, type:'clue', text: p.clue });
    cards.push({ pairId: i, type:'answer', text: p.answer });
  });
  // Shuffle
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  cards.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = `memory-card card-${card.type}`;
    el.dataset.index = idx;
    el.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back">
          <img src="../LOGO/LOGO PNG/WHITEBOARD 2.0-10.png" alt="WHITEBOARD">
        </div>
        <div class="card-face card-front">
          <span class="card-type-label">${card.type === 'clue' ? 'רמז' : 'תשובה'}</span>
          <span class="card-text">${card.text}</span>
          <span class="match-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>
        </div>
      </div>`;
    el.addEventListener('click', () => onCardClick(idx, el));
    grid.appendChild(el);
  });
}

function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    document.getElementById('timerDisplay').textContent = `${m}:${s}`;
  }, 1000);
}

function onCardClick(idx, el) {
  if (lockBoard) return;
  if (el.classList.contains('flipped') || el.classList.contains('matched')) return;

  // Start timer on first ever click
  startTimer();

  el.classList.add('flipped');

  if (!firstPick) {
    firstPick = { idx, el };
    return;
  }

  secondPick = { idx, el };
  attempts++;
  document.getElementById('attemptsDisplay').textContent = attempts;
  lockBoard = true;

  // Check match
  const c1 = cards[firstPick.idx];
  const c2 = cards[secondPick.idx];

  if (c1.pairId === c2.pairId && c1.type !== c2.type) {
    // Match!
    setTimeout(() => {
      firstPick.el.classList.add('matched');
      secondPick.el.classList.add('matched');
      matchedCount++;
      document.getElementById('pairsDisplay').textContent = matchedCount;
      resetPicks();
      if (matchedCount === totalPairs) {
        clearInterval(timerInterval);
        setTimeout(showResult, 500);
      }
    }, 300);
  } else {
    // No match
    setTimeout(() => {
      firstPick.el.classList.add('wrong');
      secondPick.el.classList.add('wrong');
      setTimeout(() => {
        firstPick.el.classList.remove('flipped', 'wrong');
        secondPick.el.classList.remove('flipped', 'wrong');
        resetPicks();
      }, 1000);
    }, 300);
  }
}

function resetPicks() {
  firstPick = null;
  secondPick = null;
  lockBoard = false;
}

function showResult() {
  // Star rating
  let stars = 1;
  if (attempts <= totalPairs * 1.5) stars = 3;
  else if (attempts <= totalPairs * 2.25) stars = 2;

  const accuracy = Math.round((totalPairs / attempts) * 100);
  const m = String(Math.floor(seconds / 60)).padStart(2, '0');
  const s = String(seconds % 60).padStart(2, '0');

  // Title
  const titles = {
    3: '!מושלם',
    2: '!כל הכבוד',
    1: '!סיימת'
  };
  document.getElementById('result-title').textContent = titles[stars];

  // Mascot
  const mascotSrc = stars === 3 ? '../BOARDi/SVG/2.svg' : '../BOARDi/SVG/4.svg';
  document.getElementById('result-mascot-img').src = mascotSrc;

  // Stars
  const starsRow = document.getElementById('starsRow');
  starsRow.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const starSvg = document.createElement('div');
    const earned = i < stars;
    starSvg.className = `star-icon${earned ? ' earned' : ''}`;
    starSvg.innerHTML = `<svg viewBox="0 0 24 24" fill="${earned ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
    if (earned) {
      starSvg.style.animationDelay = `${i * 200}ms`;
      starSvg.classList.add('anim');
    }
    starsRow.appendChild(starSvg);
  }

  // Stats
  document.getElementById('result-stats').innerHTML =
    `ניסיונות: <b>${attempts}</b><br>זמן: <b>${m}:${s}</b><br>דיוק: <b>${accuracy}%</b>`;

  document.getElementById('result').classList.add('show');

  // Confetti for 3 stars
  if (stars === 3) spawnConfetti();
}

function spawnConfetti() {
  const colors = ['#38C4F2','#F05680','#EAD654','#7DC57A','#253E7A'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * 1.2 + 's';
    c.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
    c.style.width = (5 + Math.random() * 6) + 'px';
    c.style.height = (5 + Math.random() * 6) + 'px';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 3500);
  }
}

// Replay
document.getElementById('replay-btn').addEventListener('click', initGame);

// Start immediately
initGame();
</script>

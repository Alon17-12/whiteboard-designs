<!DOCTYPE html>
<html lang="he" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בורדי · מנתח התלמידים — WHITEBOARD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#253E7A;--navy-dark:#1a2e5e;--cyan:#38C4F2;--pink:#F05680;--green:#7DC57A;--green-bright:#22c55e;--yellow:#EAD654;--purple:#9B6BF2;--orange:#F5A65B;
  --bg:#EBF3FB;--surface:#FFFFFF;--surface-2:#F4F9FF;--surface-3:#edf4ff;--border:rgba(37,62,122,0.1);--border-strong:rgba(37,62,122,0.16);
  --text-main:#1a2f5e;--text-sub:rgba(37,62,122,0.55);--text-xs:rgba(37,62,122,0.38);
  --r-xs:6px;--r-sm:10px;--r-md:16px;--r-lg:18px;
  --shadow:0 18px 50px -22px rgba(37,62,122,0.45);--shadow-sm:0 6px 22px -12px rgba(37,62,122,0.4);
}
[data-theme="dark"]{
  --bg:#0c1422;--surface:#131e35;--surface-2:#192740;--surface-3:#1e2e48;--border:rgba(255,255,255,0.08);--border-strong:rgba(255,255,255,0.16);
  --text-main:#dde5f5;--text-sub:rgba(221,229,245,0.55);--text-xs:rgba(221,229,245,0.3);--shadow-sm:0 8px 26px -14px rgba(0,0,0,0.7);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text-main);-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:10px}
.shell{display:flex;height:100vh}

/* SIDEBAR */
.side{width:220px;flex:0 0 220px;background:var(--navy);color:#fff;display:flex;flex-direction:column;padding:18px 14px}
.logo{display:flex;flex-direction:column;align-items:center;gap:6px;padding:6px 0 14px}
.logo .mk{width:46px;height:46px;border-radius:12px;background:#fff;display:flex;align-items:center;justify-content:center}
.logo .mk svg{width:30px;height:30px}
.logo .wm{font-family:'Fredoka';font-weight:700;font-size:15px;letter-spacing:.5px}
.logo .wm small{display:block;font-size:8px;letter-spacing:3px;color:#ffffff88;text-align:center;font-family:'Heebo';font-weight:500}
.nav-tag{font-size:10px;color:#ffffff55;letter-spacing:1px;margin:12px 10px 6px}
.side nav a{display:flex;align-items:center;gap:11px;color:#dbe6ff;font-size:13.5px;padding:10px 12px;border-radius:9px;margin-bottom:2px;transition:.15s}
.side nav a svg{width:17px;height:17px;flex:0 0 auto;opacity:.85}
.side nav a:hover{background:#ffffff10}
.side nav a.on{background:linear-gradient(90deg,#ffffff22,#ffffff10);color:#fff;font-weight:600}
.side nav a.on svg{opacity:1;color:var(--cyan)}
.side .spacer{flex:1}
.mode-tog{display:flex;background:#ffffff14;border-radius:10px;padding:3px;margin:4px 4px 12px}
.mode-tog button{flex:1;font-size:12px;padding:7px;border-radius:8px;color:#cdd9f5;display:flex;align-items:center;justify-content:center;gap:5px}
.mode-tog button.on{background:#fff;color:var(--navy);font-weight:700}
.mode-tog button svg{width:14px;height:14px}
.prof{display:flex;align-items:center;gap:10px;padding:8px 6px;border-top:1px solid #ffffff1a}
.prof .av{width:34px;height:34px;border-radius:50%;background:var(--pink);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Fredoka'}
.prof .nm{font-size:13px;font-weight:600}.prof .em{font-size:10.5px;color:#ffffff77}

/* TOPBAR */
.wrap{flex:1;display:flex;flex-direction:column;min-width:0}
.top{height:60px;flex:0 0 60px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 22px}
.top .crumb{display:flex;align-items:center;gap:10px}
.top .back{width:34px;height:34px;border-radius:9px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-sub)}
.top h1{font-family:'Fredoka';font-size:18px;font-weight:600}
.top h1 span{color:var(--text-xs);font-weight:400;font-size:14px}
.top .acts{display:flex;gap:8px}
.iconbtn{width:36px;height:36px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--text-sub);display:flex;align-items:center;justify-content:center}
.iconbtn:hover{color:var(--cyan);border-color:var(--cyan)}
.iconbtn svg{width:17px;height:17px}

.body{flex:1;display:flex;min-height:0}
.chat{flex:1;display:flex;flex-direction:column;min-width:0}
.stream{flex:1;overflow-y:auto;padding:26px clamp(18px,4vw,48px);display:flex;flex-direction:column;gap:16px}
.stream .day{align-self:center;font-size:11px;color:var(--text-xs);background:var(--surface);border:1px solid var(--border);padding:4px 12px;border-radius:100px}

/* message rows */
.row{display:flex;gap:12px;max-width:820px;align-items:flex-end;align-self:flex-start;animation:pop .35s ease}
.row.me{align-self:flex-end;flex-direction:row-reverse}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.av-b{width:54px;height:54px;flex:0 0 auto;display:flex;align-items:flex-end;justify-content:center}
.av-b img{width:54px;height:54px;object-fit:contain;filter:drop-shadow(0 5px 12px rgba(37,62,122,.20))}
.av-me{width:38px;height:38px;flex:0 0 auto;border-radius:50%;background:var(--pink);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Fredoka';font-weight:700;box-shadow:var(--shadow-sm);align-self:flex-end;margin-bottom:2px}
.bub{background:var(--surface);border:1px solid var(--border);border-radius:16px 4px 16px 16px;padding:13px 16px;font-size:14.5px;line-height:1.6;box-shadow:var(--shadow-sm);color:var(--text-main)}
.bub.bare{background:none;border:none;box-shadow:none;padding:0}
.row.me .bub{background:var(--navy);color:#eaf1ff;border-radius:4px 16px 16px 16px;border-color:transparent}
.bub .who{font-size:11px;color:var(--cyan);font-weight:700;margin-bottom:4px;font-family:'Fredoka'}
.time{font-size:10px;color:var(--text-xs);margin-top:6px}
.typing{display:flex;gap:5px;align-items:center;padding:15px 18px}
.typing i{width:8px;height:8px;border-radius:50%;background:var(--cyan);animation:bounce 1.2s infinite}
.typing i:nth-child(2){animation-delay:.15s}.typing i:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.typing-lbl{font-size:11px;color:var(--text-xs);margin-right:2px}

/* pillar quick actions */
.qa{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;max-width:580px}
.qacard{text-align:right;background:var(--surface-2);border:1.5px solid var(--border);border-radius:14px;padding:15px;transition:.15s}
.qacard:hover{border-color:var(--cyan);transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.qacard .qi{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.qacard .qi svg{width:20px;height:20px}
.qacard h4{font-size:14.5px;font-weight:700;margin-bottom:3px}
.qacard p{font-size:12px;color:var(--text-sub);line-height:1.4}
.mc .q{font-size:14.5px;font-weight:600;margin-bottom:11px}
.mc .opts{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.opt{text-align:right;background:var(--surface-2);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;font-size:13.5px;font-weight:500;display:flex;align-items:center;gap:10px;transition:.15s}
.opt:hover{border-color:var(--cyan);transform:translateY(-1px)}
.opt .dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border-strong);flex:0 0 auto}
.opt.pick{border-color:var(--green-bright);background:color-mix(in srgb,var(--green-bright) 10%,var(--surface));pointer-events:none}
.opt.dim{opacity:.4}

/* DATA CARD */
.dcard{background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;max-width:660px;position:relative}
.dh{padding:15px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.dh .di{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.dh h3{font-family:'Fredoka';font-size:16px;font-weight:600;flex:1}
.dh .tag{font-size:10.5px;font-weight:700;color:var(--text-xs);background:var(--surface-3);padding:3px 9px;border-radius:100px}
.db{padding:16px 18px}
/* pin button */
.pin{width:30px;height:30px;border-radius:9px;border:1px solid var(--border);color:var(--text-sub);display:flex;align-items:center;justify-content:center;flex:0 0 auto;transition:.15s}
.pin svg{width:15px;height:15px}
.pin:hover{border-color:var(--cyan);color:var(--cyan);background:color-mix(in srgb,var(--cyan) 8%,transparent)}
.pin.done{border-color:var(--green-bright);color:#fff;background:var(--green-bright)}

.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.kpi{background:var(--surface-2);border:1px solid var(--border);border-radius:13px;padding:13px 14px}
.kpi .ki{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:9px}
.kpi .num{font-family:'Fredoka';font-size:23px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.kpi .lbl{font-size:11px;color:var(--text-sub);margin-top:3px}
.kpi .delta{font-size:10.5px;font-weight:700;margin-top:5px;display:inline-flex;align-items:center;gap:3px}
.delta.up{color:var(--green-bright)}.delta.down{color:var(--pink)}

.donut-wrap{display:flex;align-items:center;gap:22px;flex-wrap:wrap}
.dcenter{font-family:'Fredoka';font-weight:700}
.legend{display:flex;flex-direction:column;gap:9px;flex:1;min-width:150px}
.lg{display:flex;align-items:center;gap:9px;font-size:13px}
.lg .sw{width:12px;height:12px;border-radius:4px;flex:0 0 auto}
.lg .lv{margin-right:auto;font-weight:700;font-family:'Fredoka'}
.lg .lp{font-size:11px;color:var(--text-xs)}

.trend{direction:ltr}
.trend svg{width:100%;height:150px;overflow:visible}
.axis{stroke:var(--border);stroke-width:1}
.tlabels{display:flex;justify-content:space-between;direction:ltr;margin-top:6px;font-size:10.5px;color:var(--text-xs)}
.tleg{display:flex;gap:16px;margin-top:12px;direction:rtl}
.tleg .i{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-sub)}
.tleg .i b{width:14px;height:3px;border-radius:2px;display:inline-block}

.bars{display:flex;flex-direction:column;gap:11px}
.brow{display:grid;grid-template-columns:140px 1fr 52px;align-items:center;gap:10px}
.brow .bl{font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btrack{height:13px;background:var(--surface-3);border-radius:10px;overflow:hidden}
.bfill{height:100%;border-radius:10px;transition:width 1s ease}
.brow .bv{font-size:12px;font-weight:700;font-family:'Fredoka';text-align:left;font-variant-numeric:tabular-nums}

.funnel{display:flex;flex-direction:column;gap:8px}
.frow{display:grid;grid-template-columns:150px 1fr;align-items:center;gap:10px}
.frow .fl{font-size:12.5px;font-weight:600}
.fbar{height:34px;border-radius:9px;display:flex;align-items:center;padding:0 12px;color:#fff;font-weight:700;font-size:12.5px;font-family:'Fredoka';min-width:52px;transition:width 1s ease}
.fdrop{font-size:11px;font-weight:700;color:var(--pink);margin-right:8px}

.risk{display:flex;flex-direction:column;gap:9px}
.rrow{display:flex;align-items:center;gap:11px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:10px 13px}
.rrow .ra{width:34px;height:34px;border-radius:50%;color:#fff;font-family:'Fredoka';font-weight:700;display:flex;align-items:center;justify-content:center;font-size:13px;flex:0 0 auto}
.rrow .rn{font-size:13.5px;font-weight:600}.rrow .rd{font-size:11px;color:var(--text-xs)}
.rrow .rb{margin-right:auto;font-size:11px;font-weight:700;padding:4px 10px;border-radius:100px}
.rb.hi{background:color-mix(in srgb,var(--pink) 15%,transparent);color:var(--pink)}
.rb.mid{background:color-mix(in srgb,var(--yellow) 22%,transparent);color:#a8971a}

.insight{position:relative;display:flex;gap:12px;align-items:flex-start;background:linear-gradient(135deg,color-mix(in srgb,var(--cyan) 12%,var(--surface)),var(--surface));border:1px solid color-mix(in srgb,var(--cyan) 32%,transparent);border-radius:14px;padding:15px 17px;max-width:660px}
.insight .ii{width:38px;height:38px;border-radius:11px;background:color-mix(in srgb,var(--cyan) 18%,transparent);color:var(--cyan);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.insight .itx{flex:1}.insight b{font-size:14px}.insight p{font-size:13px;color:var(--text-sub);margin:3px 0 0}
.insight .pin{position:static}

.handoff{max-width:560px;background:linear-gradient(135deg,color-mix(in srgb,var(--purple) 14%,var(--surface)),var(--surface));border:1px solid color-mix(in srgb,var(--purple) 35%,transparent);border-radius:16px;padding:16px 18px;display:flex;gap:13px;align-items:center}
.handoff .hi{width:42px;height:42px;border-radius:11px;background:color-mix(in srgb,var(--purple) 20%,transparent);color:var(--purple);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.handoff .ht{flex:1}.handoff .ht b{font-size:14px}.handoff .ht p{font-size:12.5px;margin:2px 0 0;color:var(--text-sub)}
.handoff .hb{background:var(--purple);color:#fff;font-size:12.5px;font-weight:700;padding:9px 14px;border-radius:10px;white-space:nowrap}

.composer{flex:0 0 auto;padding:14px clamp(18px,4vw,48px) 18px;border-top:1px solid var(--border);background:var(--surface)}
.cbox{max-width:820px;margin:0 auto;display:flex;align-items:center;gap:10px;background:var(--surface-2);border:1.5px solid var(--border);border-radius:14px;padding:7px 8px 7px 16px}
.cbox:focus-within{border-color:var(--cyan)}
.cbox input{flex:1;background:none;border:none;outline:none;font-family:inherit;font-size:14px;color:var(--text-main)}
.cbox input::placeholder{color:var(--text-xs)}
.cbox .snd{width:40px;height:40px;border-radius:11px;background:var(--cyan);color:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.cbox .snd svg{width:18px;height:18px}
.cbox .attach{color:var(--text-xs);display:flex;align-items:center;justify-content:center;width:32px;height:32px}

/* ===== DATA BOARD RAIL ===== */
.rail{width:312px;flex:0 0 312px;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;min-height:0}
.rhead{padding:18px 18px 14px;border-bottom:1px solid var(--border)}
.rhead .rtitle{display:flex;align-items:center;gap:9px}
.rhead .rtitle .bmark{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--navy),var(--cyan));color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Fredoka';font-weight:700;font-size:13px}
.rhead h2{font-family:'Fredoka';font-size:16px;font-weight:700;flex:1}
.rhead .live{font-size:9.5px;font-weight:700;color:var(--green-bright);display:flex;align-items:center;gap:4px}
.rhead .live::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--green-bright);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.rhead .rsub{font-size:11.5px;color:var(--text-xs);margin:4px 0 12px}
.dlbtn{width:100%;background:var(--navy);color:#fff;font-weight:700;font-size:13.5px;padding:11px;border-radius:11px;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s}
.dlbtn svg{width:16px;height:16px}
.dlbtn:hover{background:var(--navy-dark)}
.dlbtn:disabled{opacity:.45;cursor:not-allowed}
.rbody{flex:1;overflow-y:auto;padding:14px 16px}
.sectlabel{font-size:10.5px;color:var(--text-xs);letter-spacing:.5px;font-weight:700;margin:4px 2px 9px;display:flex;align-items:center;gap:6px}
.sectlabel .cnt{background:var(--surface-3);color:var(--text-sub);border-radius:100px;padding:1px 7px;font-size:10px}
/* pinned rows */
.pinrow{display:flex;align-items:flex-start;gap:10px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px;animation:pinin .35s ease}
@keyframes pinin{from{opacity:0;transform:translateY(-6px) scale(.97)}to{opacity:1;transform:none}}
.pinrow .pk{width:28px;height:28px;border-radius:8px;background:color-mix(in srgb,var(--cyan) 15%,transparent);color:var(--cyan);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.pinrow .pk svg{width:15px;height:15px}
.pinrow .pt{font-size:12.5px;font-weight:700;line-height:1.3}
.pinrow .ptime{font-size:10.5px;color:var(--text-xs);margin-top:2px;display:flex;align-items:center;gap:4px}
.pinrow .prem{width:24px;height:24px;border-radius:7px;color:var(--text-xs);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.pinrow .prem:hover{background:color-mix(in srgb,var(--pink) 14%,transparent);color:var(--pink)}
.empty{text-align:center;color:var(--text-xs);font-size:12px;padding:18px 10px;border:1.5px dashed var(--border-strong);border-radius:12px;line-height:1.6}
.empty svg{width:26px;height:26px;color:var(--border-strong);margin-bottom:6px}
/* suggestions (reuse alert look) */
.alert{text-align:right;width:100%;display:flex;gap:10px;align-items:flex-start;background:var(--surface-2);border:1px solid var(--border);border-right:3px solid var(--sev,var(--cyan));border-radius:12px;padding:10px 11px;transition:.16s;margin-bottom:8px}
.alert:hover{transform:translateX(-3px);box-shadow:var(--shadow-sm)}
.alert .ai{width:28px;height:28px;border-radius:8px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:color-mix(in srgb,var(--sev) 16%,transparent);color:var(--sev)}
.alert .ai svg{width:15px;height:15px}
.alert .at{font-size:12px;font-weight:700;line-height:1.3}
.alert .ad{font-size:10.5px;color:var(--text-sub);margin-top:2px;line-height:1.4}
.alert .ask{font-size:10px;color:var(--cyan);font-weight:700;margin-top:6px;display:flex;align-items:center;gap:4px}
.alert.hi{--sev:var(--pink)}.alert.mid{--sev:var(--orange)}.alert.ok{--sev:var(--green-bright)}.alert.info{--sev:var(--cyan)}
.alert .nb{font-size:8.5px;font-weight:800;color:#fff;background:var(--pink);border-radius:100px;padding:1px 6px;margin-right:auto}

.ctrl{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:9px;background:var(--navy);color:#fff;border-radius:100px;padding:8px 10px 8px 18px;box-shadow:var(--shadow);z-index:60}
.ctrl .lbl{font-size:12px;font-weight:600}
.ctrl button{background:#ffffff1a;border-radius:100px;padding:8px 15px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.ctrl button.play{background:var(--cyan);color:var(--navy)}
.ctrl button:hover{filter:brightness(1.08)}.ctrl .rst{background:transparent;padding:8px}
.ctrl button svg{width:15px;height:15px}
.toasts{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:80}
.toast{background:var(--surface);border:1px solid var(--border);border-right:4px solid var(--green-bright);border-radius:12px;padding:13px 16px;box-shadow:var(--shadow);display:flex;gap:11px;align-items:center;min-width:250px;animation:slidein .3s ease}
@keyframes slidein{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:none}}
.toast .ti{width:30px;height:30px;border-radius:8px;background:color-mix(in srgb,var(--green-bright) 15%,transparent);color:var(--green-bright);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.toast .tx b{font-size:13.5px}.toast .tx p{font-size:11.5px;color:var(--text-sub);margin:0}
@media (max-width:1180px){.rail{display:none}}
@media (max-width:760px){.side{display:none}.kpis{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="logo">

<script>
const M="../BOARDi/SVG/";

function boardi(html,bare){

/* ---------- data-viz builders ---------- */
function kpiRow(items){
  return `<div class="kpis">${items.map(k=>`<div class="kpi"><div class="ki" style="background:color-mix(in srgb,${k.c} 16%,transparent);color:${k.c}">${k.icon}</div>

}
function donutSVG(segs,centerNum,centerLbl){
  const R=52,C=2*Math.PI*R,total=segs.reduce((s,x)=>s+x.value,0);let off=0,arcs='';
  segs.forEach(s=>{const len=C*s.value/total;arcs+=`<circle r="${R}" cx="70" cy="70" fill="none" stroke="${s.color}" stroke-width="17" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 70 70)"/>`;off+=len;});
  return `<svg width="140" height="140" viewBox="0 0 140 140"><circle r="${R}" cx="70" cy="70" fill="none" stroke="var(--surface-3)" stroke-width="17"/>${arcs}
    <text x="70" y="66" text-anchor="middle" class="dcenter" font-size="26" fill="var(--text-main)">${centerNum}</text>
    <text x="70" y="86" text-anchor="middle" font-size="11" fill="var(--text-sub)">${centerLbl}</text></svg>`;
}
function donutCard(title,segs,centerLbl){
  const total=segs.reduce((s,x)=>s+x.value,0);
  const leg=segs.map(s=>`<div class="lg"><span class="sw" style="background:${s.color}"></span>${s.label}<span class="lp">${Math.round(s.value/total*100)}%</span><span class="lv">${s.value}</span></div>`).join('');
  return dcard(title,'var(--purple)',pieIcon,`<div class="donut-wrap"><div class="donut">${donutSVG(segs,total,centerLbl||'')}</div><div class="legend">${leg}</div></div>`);
}
function trendCard(title,months,s1,s2,leg1,leg2,c1,c2){
  c1=c1||'var(--cyan)';c2=c2||'var(--purple)';
  const W=600,H=140,pad=8,xs=i=>pad+i*(W-2*pad)/(months.length-1),ys=v=>H-8-(v/100)*(H-20);
  const path=a=>a.map((v,i)=>(i?'L':'M')+xs(i).toFixed(1)+' '+ys(v).toFixed(1)).join(' ');
  const area=a=>path(a)+` L ${xs(a.length-1).toFixed(1)} ${H} L ${xs(0).toFixed(1)} ${H} Z`;
  let svg=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><line class="axis" x1="0" y1="${ys(50)}" x2="${W}" y2="${ys(50)}"/>
    <defs><linearGradient id="tg${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${c1}" stop-opacity=".28"/><stop offset="100%" stop-color="${c1}" stop-opacity="0"/></linearGradient></defs>
    <path d="${area(s1)}" fill="url(#tg${gid})"/><path d="${path(s1)}" fill="none" stroke="${c1}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>`;
  if(s2)svg+=`<path d="${path(s2)}" fill="none" stroke="${c2}" stroke-width="3" stroke-dasharray="6 5" stroke-linecap="round" stroke-linejoin="round"/>`;
  svg+=s1.map((v,i)=>`<circle cx="${xs(i)}" cy="${ys(v)}" r="3.5" fill="var(--surface)" stroke="${c1}" stroke-width="2.5"/>`).join('')+`</svg>`;
  gid++;
  const labels=`<div class="tlabels">${months.map(m=>`<span>${m}</span>`).join('')}</div>`;
  const leg=`<div class="tleg"><div class="i"><b style="background:${c1}"></b> ${leg1}</div>${s2?`<div class="i"><b style="background:${c2}"></b> ${leg2}</div>`:''}</div>`;
  return dcard(title,'var(--cyan)',trendIcon,`<div class="trend">${svg}${labels}</div>${leg}`);
}
let gid=0;
function barsCard(title,rows,color){
  const max=Math.max(...rows.map(r=>r.v));
  const body=rows.map(r=>`<div class="brow"><span class="bl">${r.l}</span><div class="btrack"><div class="bfill" style="width:${Math.round(r.v/max*100)}%;background:${r.c||color}"></div></div><span class="bv">${r.suf?r.v+r.suf:r.v}</span></div>`).join('');
  return dcard(title,color||'var(--cyan)',barIcon,`<div class="bars">${body}</div>`);
}

}

  return dcard('תלמידים בסיכון נטישה','var(--pink)',riskIcon,`<div class="risk">${body}</div>`);
}

/* ---------- DATA Board (pin + report) ---------- */
const PINS=[];
function pinFromEl(btn){
  if(btn.classList.contains('done'))return;
  const card=btn.closest('.dcard,.insight');
  const title=card.dataset.title||card.querySelector('h3,b')?.textContent||'תובנה';

  const time=new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'});
  PINS.push({title,time,html:clone.outerHTML});
  btn.classList.add('done');btn.innerHTML=pinnedSVG;
  renderBoard();toast('נעוץ ל-DATA Board',title+' · '+time);
}
function unpin(i){PINS.splice(i,1);renderBoard()}
function renderBoard(){
  const b=document.getElementById('board');

}

  if(!PINS.length)return;

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

async function runPillar(key){
  const p=PILLARS[key];
  showTyping('בורדי מנתח '+p.name+'…');await sleep(950);hideTyping();
  boardi(p.intro);await sleep(200);
  p.render();await sleep(150);

  scrollDown();

/* ---------- proactive suggestions feed ---------- */

  {sev:'ok',icon:salesIcon,title:'יום שיא מכירות 🎉',detail:'₪4,200 אתמול — שיא חודשי',q:'ספר לי על יום שיא המכירות',respond:()=>{boardi(insightCard('אתמול נמכרו 9 קורסים (₪4,200) — 80% מהם UX/UI מתקדם, בעקבות הפוסט באינסטגרם. שווה להריץ שוב את אותו קריאייטיב.'),true)}}

function alertHTML(a,i,isNew){return `<button class="alert ${a.sev}" data-i="${i}"><div class="ai">${a.icon}</div>
  <div style="flex:1"><div class="at">${a.title} ${isNew?'<span class="nb">חדש</span>':''}</div><div class="ad">${a.detail}</div>
  <div class="ask">שאל את בורדי <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div></div></button>`}
function bindAlerts(){document.querySelectorAll('#feed .alert').forEach(b=>b.onclick=()=>{const a=ALERTS[b.dataset.i];askFromAlert(a.q,a.respond)})}
function renderFeed(){document.getElementById('feed').innerHTML=ALERTS.map((a,i)=>alertHTML(a,i)).join('');bindAlerts()}
renderFeed();

  const i=ALERTS.length-1;const f=document.getElementById('feed');

function handoffCard(){
  const r=document.createElement('div');r.className='row';
  r.innerHTML=`<div class="av-b"><img src="${M}5.svg" onerror="this.parentNode.textContent='🎉'"></div>
  <div class="handoff"><div class="hi"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12h16M14 6l6 6-6 6"/></svg></div>
    <div class="ht"><b>נזהה 14 תלמידים לא-פעילים — נחזיר אותם?</b><p>אעביר לבורדי הדיוור ואכין קמפיין החזרה ממוקד.</p></div>
    <button class="hb" onclick="toast('מעבר לבורדי דיוור','14 נמענים + הקשר הועברו');this.closest('.row').remove()">כן, בנה קמפיין →</button></div>`;
  stream.appendChild(r);scrollDown();
}
function toast(t,p){const el=document.createElement('div');el.className='toast';
  el.innerHTML=`<div class="ti"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg></div><div class="tx"><b>${t}</b><p>${p}</p></div>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{el.style.opacity=0;el.style.transform='translateX(-30px)';el.style.transition='.3s';setTimeout(()=>el.remove(),300)},3600);}

/* ---------- tour / controls ---------- */
let playing=false;
function stopPlay(){playing=false;document.getElementById('play').innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> נגן'}
let started=false;
async function tour(){
  if(started)return;started=true;playing=true;
  boardi(`שלום אלון 👋 אני בורדי, האנליסט שלך. אני בודק ארבעה תחומים: <b>סקירה כללית</b>, <b>שיווק</b>, <b>מכירות</b> ו<b>שירות (איכות הקורסים)</b> — ומכאן צוללים לכל ענף.<br>במה נתחיל?`);
  await sleep(1300);if(!playing)return;
  showPillars();await sleep(1500);if(!playing)return;
  me('נתח לי סקירה כללית');await runPillar('overview');await sleep(900);if(!playing)return;
  const mc=boardi(`<div class="mc"><div class="q">רוצה שאעמיק בתחום מסוים?</div><div class="opts">
    <button class="opt" data-k="marketing"><span class="dot"></span>שיווק</button>
    <button class="opt" data-k="sales"><span class="dot"></span>מכירות</button>
    <button class="opt" data-k="service"><span class="dot"></span>שירות · איכות</button>
    <button class="opt" data-k="none"><span class="dot"></span>תודה, זה מספיק</button></div></div>`);
  mc.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{mc.querySelectorAll('.opt').forEach(x=>x.classList.add('dim'));b.classList.remove('dim');b.classList.add('pick');stopPlay();if(b.dataset.k!=='none'){me('נעמיק ב'+PILLARS[b.dataset.k].name);runPillar(b.dataset.k)}else me('תודה!')});
  await sleep(1600);if(!playing)return;
  const first=mc.querySelector('.opt');if(first&&playing)first.click();
}
document.getElementById('play').onclick=function(){
  if(started){stopPlay();return}
  this.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg> רץ…';tour();
};
document.getElementById('reset').onclick=()=>location.reload();
document.getElementById('sendbtn').onclick=()=>{if(inp.value.trim()){me(inp.value.trim());inp.value=''}};
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&inp.value.trim()){me(inp.value.trim());inp.value=''}});

const root=document.documentElement,tb=document.getElementById('theme');
tb.onclick=()=>{const d=root.getAttribute('data-theme')==='dark';root.setAttribute('data-theme',d?'light':'dark');
  tb.querySelector('svg').innerHTML=d?'<path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/>':'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>';};

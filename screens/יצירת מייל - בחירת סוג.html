<!DOCTYPE html>
<html lang="he" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יצירת מייל — בחירת סוג | WHITEBOARD דיוור</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#253E7A; --navy-dark:#1a2f5e; --navy-light:#3a5499;
    --cyan:#38C4F2; --cyan-dark:#1db0d8; --cyan-light:rgba(56,196,242,0.12);
    --light-blue:#E3F4FD; --pink:#F05680; --pink-light:rgba(240,86,128,0.12);
    --yellow:#EAD654; --yellow-light:rgba(234,214,84,0.18);
    --green:#7DC57A; --green-bright:#22c55e; --green-light:rgba(125,197,122,0.14);
    --bg:#EBF3FB; --surface:#FFFFFF; --surface-2:#f5f8ff; --surface-3:#edf4ff;
    --border:rgba(37,62,122,0.12); --border-hover:rgba(56,196,242,0.45);
    --text-main:#1a2f5e; --text-sub:rgba(37,62,122,0.6); --text-light:rgba(37,62,122,0.4);
    --font-he:'Heebo',sans-serif; --font-en:'Fredoka',sans-serif;
    --r-sm:10px; --r-md:14px; --r-lg:20px;
    --sh-lg:0 24px 64px rgba(37,62,122,0.28);
  }
  [data-theme="dark"]{
    --cyan-light:rgba(56,196,242,0.14); --light-blue:rgba(56,196,242,0.1);
    --bg:#0c1424; --surface:#131e35; --surface-2:#1a2740; --surface-3:#1e2e48;
    --border:rgba(255,255,255,0.08); --text-main:#dde5f5; --text-sub:rgba(221,229,245,0.6); --text-light:rgba(221,229,245,0.34);
    --sh-lg:0 24px 64px rgba(0,0,0,0.6);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-he);background:var(--bg);color:var(--text-main);min-height:100dvh;transition:background .3s,color .3s;}

  /* faux background (mailing list, dimmed) */
  .bg{position:fixed;inset:0;padding:34px;filter:blur(3px);opacity:.55;pointer-events:none;}
  .bg h1{font-size:24px;font-weight:900;margin-bottom:18px;}
  .bg .row{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:16px 20px;margin-bottom:12px;}
  .bg .row .nm{font-weight:700;flex:1;} .bg .row .b{height:10px;border-radius:5px;background:var(--surface-3);}
  .scrim{position:fixed;inset:0;background:rgba(26,47,94,0.5);backdrop-filter:blur(2px);z-index:10;}
  [data-theme="dark"] .scrim{background:rgba(0,0,0,0.6);}

  .theme-btn{position:fixed;top:18px;left:18px;z-index:30;width:40px;height:40px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-sub);}
  .theme-btn svg{width:19px;height:19px;} .icon-sun{display:none;} [data-theme="dark"] .icon-sun{display:block;} [data-theme="dark"] .icon-moon{display:none;}

  /* modal */
  .wrap{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;padding:24px;}
  .modal{width:100%;max-width:640px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--sh-lg);overflow:hidden;animation:pop .35s cubic-bezier(.4,.8,.3,1);}
  @keyframes pop{from{opacity:0;transform:translateY(16px) scale(.96);}to{opacity:1;transform:none;}}
  .m-head{display:flex;align-items:flex-start;gap:14px;padding:24px 26px 18px;border-bottom:1px solid var(--border);}
  .m-head .bi{width:46px;height:46px;border-radius:13px;background:var(--cyan-light);color:var(--cyan);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .m-head .bi svg{width:23px;height:23px;}
  .m-head h2{font-size:19px;font-weight:800;} .m-head p{font-size:13px;color:var(--text-sub);margin-top:3px;line-height:1.5;}
  .m-close{margin-inline-start:auto;width:34px;height:34px;border-radius:10px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-sub);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;}
  .m-close:hover{background:var(--pink-light);color:var(--pink);border-color:var(--pink);} .m-close svg{width:16px;height:16px;}
  .m-body{padding:22px 26px;display:flex;flex-direction:column;gap:12px;}

  .opt{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;border:2px solid var(--border);border-radius:var(--r-md);background:var(--surface-2);cursor:pointer;transition:all .18s;text-align:start;}
  .opt:hover{border-color:var(--border-hover);transform:translateY(-1px);}
  .opt.sel{border-color:var(--cyan);background:var(--cyan-light);}
  .opt .oi{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .opt .oi svg{width:22px;height:22px;}
  .oi.c1{background:rgba(56,196,242,0.16);color:var(--cyan);} .oi.c2{background:rgba(125,197,122,0.18);color:var(--green);} .oi.c3{background:rgba(234,214,84,0.22);color:#b89c00;}
  [data-theme="dark"] .oi.c3{color:var(--yellow);}
  .opt-b{flex:1;min-width:0;}
  .opt-t{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;}
  .opt-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--surface-3);color:var(--text-sub);font-family:var(--font-en);}
  .opt-d{font-size:12.5px;color:var(--text-sub);margin-top:4px;line-height:1.5;}
  .opt-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:3px;position:relative;transition:all .18s;}
  .opt.sel .opt-check{border-color:var(--cyan);background:var(--cyan);}
  .opt.sel .opt-check::after{content:'';position:absolute;inset:4px;border-radius:50%;background:#fff;}

  .m-foot{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:18px 26px;border-top:1px solid var(--border);background:var(--surface-2);}
  .m-foot .hint{font-size:12px;color:var(--text-light);}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:11px 22px;border-radius:26px;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all .2s;}
  .btn svg{width:16px;height:16px;}
  .btn-ghost{background:var(--surface);color:var(--navy);border:1.5px solid var(--border);} .btn-ghost:hover{background:var(--light-blue);border-color:var(--cyan);} [data-theme="dark"] .btn-ghost{color:var(--text-main);}
  .btn-primary{background:linear-gradient(135deg,var(--cyan),var(--cyan-dark));color:#fff;box-shadow:0 4px 16px rgba(56,196,242,0.35);} [data-theme="dark"] .btn-primary{color:#0b1424;}
  .btn-primary:hover{transform:translateY(-1px);} .btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;}

  .toasts{position:fixed;bottom:22px;inset-inline-start:22px;z-index:50;}
  .toast{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 15px;box-shadow:var(--sh-lg);font-size:13px;font-weight:600;animation:tin .3s ease;}
  @keyframes tin{from{opacity:0;transform:translateX(-26px);}to{opacity:1;transform:none;}}
  .toast svg{width:17px;height:17px;color:var(--cyan);}
</style>
</head>
<body>
  <button class="theme-btn" id="themeBtn" aria-label="מצב תצוגה">
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
  </button>

  <!-- faux background -->
  <div class="bg">
    <h1>דיוור · מועדון</h1>
    <div class="row"><span class="nm">מייל הגעה למועדון</span><span class="b" style="width:120px"></span><span class="b" style="width:60px"></span></div>
    <div class="row"><span class="nm">סדרת קליטה — 3 שלבים</span><span class="b" style="width:120px"></span><span class="b" style="width:60px"></span></div>
    <div class="row"><span class="nm">נוטשי עגלה</span><span class="b" style="width:120px"></span><span class="b" style="width:60px"></span></div>
  </div>
  <div class="scrim"></div>

  <div class="wrap">
    <div class="modal" role="dialog" aria-modal="true" aria-label="יצירת מייל חדש">
      <div class="m-head">
        <div class="bi"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><path d="m22 7-10 6L2 7"/></svg></div>
        <div><h2>יצירת מייל חדש</h2><p>בחרו איך המייל יישלח. אפשר לשנות בהמשך.</p></div>
        <button class="m-close" id="closeBtn" aria-label="סגירה"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
      <div class="m-body">
        <button class="opt sel" data-opt="single">
          <div class="oi c1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></div>
          <div class="opt-b"><div class="opt-t">קמפיין בודד</div><div class="opt-d">מייל אחד שנשלח פעם אחת — לכל הרשימה או לקהל מסונן. שליחה מיידית או מתוזמנת.</div></div>
          <div class="opt-check"></div>
        </button>
        <button class="opt" data-opt="series">
          <div class="oi c2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><circle cx="18" cy="12" r="2.5"/><path d="M6 8.5v7M8.4 7.2 15.6 11M8.4 16.8 15.6 13"/></svg></div>
          <div class="opt-b"><div class="opt-t">סדרת מיילים <span class="opt-tag">DRIP</span></div><div class="opt-d">רצף מיילים עם השהיות (מייל 1 → להמתין → מייל 2…). מושלם לקליטה, אונבורדינג או קורס במיילים.</div></div>
          <div class="opt-check"></div>
        </button>
        <button class="opt" data-opt="trigger">
          <div class="oi c3"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2 3 14h7l-1 8 10-12h-7l1-8z"/></svg></div>
          <div class="opt-b"><div class="opt-t">מבוסס טריגר</div><div class="opt-d">נשלח אוטומטית כשקורה אירוע — הצטרפות, נטישת עגלה, סיום קורס, או חוסר פעילות.</div></div>
          <div class="opt-check"></div>
        </button>
      </div>
      <div class="m-foot">
        <span class="hint">לאחר הבחירה ייפתח עורך המייל האחוד.</span>
        <div style="display:flex;gap:10px">
          <button class="btn btn-ghost" id="cancelBtn">ביטול</button>
          <button class="btn btn-primary" id="continueBtn">המשך לעורך<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
        </div>
      </div>
    </div>
  </div>

  <div class="toasts" id="toasts"></div>

<script>
  try{var t=localStorage.getItem("wb-admin-theme");if(t)document.documentElement.setAttribute("data-theme",t);}catch(e){}
  document.getElementById("themeBtn").addEventListener("click",function(){var h=document.documentElement;var n=h.getAttribute("data-theme")==="dark"?"light":"dark";h.setAttribute("data-theme",n);try{localStorage.setItem("wb-admin-theme",n);}catch(e){}});
  function toast(txt){var c=document.getElementById("toasts");var t=document.createElement("div");t.className="toast";t.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>'+txt;c.appendChild(t);setTimeout(function(){t.remove();},2600);}
  var sel="single";
  document.querySelectorAll(".opt").forEach(function(o){o.addEventListener("click",function(){document.querySelectorAll(".opt").forEach(function(x){x.classList.remove("sel");});o.classList.add("sel");sel=o.dataset.opt;});});
  document.getElementById("continueBtn").addEventListener("click",function(){
    var names={single:"קמפיין בודד",series:"סדרת מיילים",trigger:"מבוסס טריגר"};
    window.location.href="עורך מייל - אחוד.html";
  });
  document.getElementById("cancelBtn").addEventListener("click",function(){toast("בוטל");});
  document.getElementById("closeBtn").addEventListener("click",function(){toast("נסגר");});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>לייב: משחק זיכרון | WHITEBOARD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#253E7A;--navy-dark:#1a2f5e;--cyan:#38C4F2;--cyan-dark:#1db0d8;
  --pink:#F05680;--yellow:#EAD654;--green:#7DC57A;
  --bg:#0c1422;--surface:#131e35;--surface-2:#192740;--surface-3:#1e2e48;
  --border:rgba(255,255,255,0.07);--border-mid:rgba(255,255,255,0.12);
  --text-main:#dde5f5;--text-sub:rgba(221,229,245,0.55);--text-xs:rgba(221,229,245,0.28);
  --font:'Heebo',sans-serif;--font-brand:'Fredoka',sans-serif;
  --r-sm:10px;--r-md:16px;--r-lg:22px;
  --sh-sm:0 2px 12px rgba(0,0,0,0.3);--sh-md:0 6px 24px rgba(0,0,0,0.4);
  --glass:rgba(12,20,34,0.7);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text-main);
  height:100dvh;overflow:hidden;user-select:none;}

/* ══ DIMMED BG ══ */
.bg-simulation{
  position:fixed;inset:0;z-index:0;
  background:linear-gradient(135deg,#0c1422 0%,#131e35 40%,#192740 70%,#0c1422 100%);
}
.bg-simulation::after{
  content:'';position:absolute;inset:0;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.bg-video-ghost{position:absolute;border-radius:var(--r-md);background:linear-gradient(135deg,#1a2f5e,#253E7A);opacity:0.25;}
.bg-v1{width:55%;height:60%;top:12%;right:22%;}
.bg-v2{width:12%;height:18%;top:8%;right:5%;}

/* ══ GAME OVERLAY ══ */
.game-overlay{
  position:relative;z-index:10;height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:16px;gap:12px;
}

/* ── Header ── */
.game-header{
  display:flex;align-items:center;gap:16px;
  background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border-mid);border-radius:var(--r-md);
  padding:12px 24px;max-width:700px;width:100%;
}
.game-title{font-family:var(--font-brand);font-size:17px;font-weight:700;color:var(--cyan);}
.game-meta{display:flex;align-items:center;gap:16px;margin-right:auto;font-size:13px;color:var(--text-sub);}
.game-timer{font-family:var(--font-brand);font-size:16px;font-weight:600;color:var(--pink);}
.game-players{display:flex;align-items:center;gap:5px;}
.game-players svg{width:14px;height:14px;opacity:0.6;}
.end-game-btn{
  padding:8px 18px;border-radius:50px;font-family:var(--font-brand);font-size:13px;font-weight:600;
  background:transparent;border:1.5px solid rgba(255,255,255,0.2);color:var(--text-sub);
  cursor:pointer;transition:all 0.2s;white-space:nowrap;
}
.end-game-btn:hover{border-color:var(--pink);color:var(--pink);}

/* ── Game Body ── */
.game-body{
  display:flex;gap:16px;max-width:700px;width:100%;flex:1;min-height:0;
}

/* ── Memory Grid ── */
.grid-area{flex:1;display:flex;align-items:center;justify-content:center;}
.memory-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  max-width:400px;width:100%;
}
.memory-card{
  aspect-ratio:5/6;perspective:1000px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.card-inner{
  position:relative;width:100%;height:100%;
  transition:transform 0.3s ease-out;transform-style:preserve-3d;
}
.memory-card.flipped .card-inner{transform:rotateY(180deg);}
.card-face{
  position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.card-back{
  background:linear-gradient(145deg,#253E7A,#1a2f5e);
  box-shadow:var(--sh-sm);border:1.5px solid rgba(255,255,255,0.06);
}
.card-back:hover{box-shadow:0 4px 16px rgba(37,62,122,0.3);border-color:rgba(56,196,242,0.3);}
.card-back img{width:55%;max-width:60px;opacity:1;object-fit:contain;}
.card-front{
  transform:rotateY(180deg);
  border:1.5px solid var(--border-mid);box-shadow:var(--sh-sm);
  background:var(--surface-2);
}
.card-front .card-emoji{font-size:32px;}
.card-front .card-text{
  font-size:12px;font-weight:700;color:var(--text-main);text-align:center;line-height:1.3;
  padding:4px;
}
.memory-card.matched .card-front{
  border-color:var(--green)!important;
  background:rgba(125,197,122,0.08);
}
.match-badge{
  display:none;position:absolute;top:4px;left:4px;
  width:18px;height:18px;border-radius:50%;background:var(--green);
  align-items:center;justify-content:center;
}
.match-badge svg{width:10px;height:10px;color:#fff;}
.memory-card.matched .match-badge{display:flex;}
@keyframes green-pulse{
  0%{box-shadow:0 0 0 0 rgba(125,197,122,0.5)}
  70%{box-shadow:0 0 0 10px rgba(125,197,122,0)}
  100%{box-shadow:0 0 0 0 rgba(125,197,122,0)}
}
.memory-card.matched .card-front{animation:green-pulse 0.6s ease;}
@keyframes card-shake{
  0%,100%{transform:rotateY(180deg) translateX(0)}
  20%{transform:rotateY(180deg) translateX(-6px)}
  40%{transform:rotateY(180deg) translateX(6px)}
  60%{transform:rotateY(180deg) translateX(-4px)}
  80%{transform:rotateY(180deg) translateX(4px)}
}
.memory-card.wrong .card-inner{animation:card-shake 0.4s ease;}
.memory-card.wrong .card-front{border-color:var(--pink)!important;background:rgba(240,86,128,0.1)!important;}

/* ── Side Leaderboard ── */
.leaderboard-panel{
  width:180px;flex-shrink:0;
  background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border-mid);border-radius:var(--r-md);
  padding:14px;display:flex;flex-direction:column;gap:6px;
  align-self:flex-start;margin-top:8px;
}
.lb-title{font-family:var(--font-brand);font-size:13px;font-weight:700;color:var(--cyan);margin-bottom:4px;
  display:flex;align-items:center;gap:6px;}
.lb-title svg{width:14px;height:14px;}
.lb-row{
  display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;
  font-size:12px;font-weight:600;transition:background 0.2s;
}
.lb-row:nth-child(2){background:rgba(234,214,84,0.08);}
.lb-rank{
  width:22px;height:22px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-brand);font-size:11px;font-weight:700;
  background:var(--surface-2);color:var(--text-sub);
}
.lb-row:nth-child(2) .lb-rank{background:var(--yellow);color:#fff;}
.lb-row:nth-child(3) .lb-rank{background:var(--text-sub);color:#fff;}
.lb-row:nth-child(4) .lb-rank{background:rgba(205,127,50,0.7);color:#fff;}
.lb-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-main);}
.lb-score{font-family:var(--font-brand);color:var(--cyan);font-size:11px;flex-shrink:0;}

/* ── Bottom Stats Bar ── */
.stats-bar{
  max-width:700px;width:100%;
  background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--border-mid);border-radius:var(--r-md);
  padding:10px 20px;display:flex;align-items:center;gap:20px;
  font-size:13px;color:var(--text-sub);font-weight:600;
  flex-shrink:0;
}
.stats-bar span{display:flex;align-items:center;gap:6px;}
.stats-bar svg{width:14px;height:14px;opacity:0.5;}
.stats-bar b{color:var(--cyan);font-family:var(--font-brand);}
.stats-bar .leader-stat{margin-right:auto;color:var(--yellow);}

/* ══ RESPONSIVE ══ */
@media(max-width:640px){
  .game-body{flex-direction:column;}
  .leaderboard-panel{width:100%;flex-direction:row;flex-wrap:wrap;align-self:stretch;}
  .memory-grid{max-width:320px;gap:6px;}
  .game-header{flex-wrap:wrap;padding:10px 16px;gap:8px;}
}
</style>
</head>
<body>

<!-- Dimmed BG -->
<div class="bg-simulation">
  <div class="bg-video-ghost bg-v1"></div>
  <div class="bg-video-ghost bg-v2"></div>
</div>

<div class="game-overlay">

  <!-- ── Header ── -->
  <div class="game-header">
    <span class="game-title">משחק חי: זיכרון</span>
    <div class="game-meta">
      <span class="game-timer" id="gameTimer">01:30</span>
      <span class="game-players">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        28 משתתפים משחקים
      </span>
    </div>
    <button class="end-game-btn">סיים משחק</button>
  </div>

  <!-- ── Game Body ── -->
  <div class="game-body">

    <!-- Memory Grid -->
    <div class="grid-area">
      <div class="memory-grid" id="memoryGrid"></div>
    </div>

    <!-- Side Leaderboard -->
    <div class="leaderboard-panel" id="leaderboard">
      <div class="lb-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        לוח מובילים
      </div>
      <div class="lb-row"><span class="lb-rank">1</span><span class="lb-name">יעל כהן</span><span class="lb-score" id="score1">5/6</span></div>
      <div class="lb-row"><span class="lb-rank">2</span><span class="lb-name">רון ברק</span><span class="lb-score">4/6</span></div>
      <div class="lb-row"><span class="lb-rank">3</span><span class="lb-name">אלון גבאי</span><span class="lb-score" id="score3">3/6</span></div>
      <div class="lb-row"><span class="lb-rank">4</span><span class="lb-name">מיכל לוי</span><span class="lb-score">2/6</span></div>
      <div class="lb-row"><span class="lb-rank">5</span><span class="lb-name">דניאל שמש</span><span class="lb-score">2/6</span></div>
    </div>
  </div>

  <!-- ── Bottom Stats ── -->
  <div class="stats-bar">
    <span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="5" width="22" height="14" rx="2"/><path d="M12 5v14"/><path d="M1 12h22"/></svg>
      זוגות שנמצאו: <b id="pairsFound">3</b>/6
    </span>
    <span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
      ניסיונות: <b id="attempts">8</b>
    </span>
    <span class="leader-stat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      מוביל/ה: יעל כהן (5/6)
    </span>
  </div>
</div>

<script>
// Card data — 6 pairs
const pairs = [
  {id:1, front:'<span class="card-text">כחול</span>', bg:'rgba(56,196,242,0.12)', borderColor:'var(--cyan)'},
  {id:1, front:'<span class="card-text">Blue</span>', bg:'rgba(56,196,242,0.12)', borderColor:'var(--cyan)'},
  {id:2, front:'<span class="card-text">ורוד</span>', bg:'rgba(240,86,128,0.10)', borderColor:'var(--pink)'},
  {id:2, front:'<span class="card-text">Pink</span>', bg:'rgba(240,86,128,0.10)', borderColor:'var(--pink)'},
  {id:3, front:'<span class="card-text">ירוק</span>', bg:'rgba(125,197,122,0.12)', borderColor:'var(--green)'},
  {id:3, front:'<span class="card-text">Green</span>', bg:'rgba(125,197,122,0.12)', borderColor:'var(--green)'},
  {id:4, front:'<span class="card-text">צהוב</span>', bg:'rgba(234,214,84,0.15)', borderColor:'var(--yellow)'},
  {id:4, front:'<span class="card-text">Yellow</span>', bg:'rgba(234,214,84,0.15)', borderColor:'var(--yellow)'},
  {id:5, front:'<span class="card-text">כהה</span>', bg:'rgba(37,62,122,0.15)', borderColor:'var(--navy)'},
  {id:5, front:'<span class="card-text">Dark</span>', bg:'rgba(37,62,122,0.15)', borderColor:'var(--navy)'},
  {id:6, front:'<span class="card-text">בהיר</span>', bg:'rgba(255,255,255,0.08)', borderColor:'rgba(255,255,255,0.3)'},
  {id:6, front:'<span class="card-text">Light</span>', bg:'rgba(255,255,255,0.08)', borderColor:'rgba(255,255,255,0.3)'},
];

// Shuffle
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// Pre-flip first 3 pairs (already matched)
const logoPath = '../LOGO/LOGO PNG/WHITEBOARD 2.0-10.png';
const grid = document.getElementById('memoryGrid');
let matchCount = 3;
let attemptCount = 8;
let flippedCards = [];
let lockBoard = false;

// Build cards
const shuffled = shuffle([...pairs]);
// Mark first 3 unique IDs as pre-matched
const preMatched = new Set();
shuffled.forEach(c=>{if(preMatched.size<3) preMatched.add(c.id);});

shuffled.forEach((card,i)=>{
  const isMatched = preMatched.has(card.id);
  const div = document.createElement('div');
  div.className = 'memory-card' + (isMatched?' flipped matched':'');
  div.dataset.pairId = card.id;
  div.innerHTML = `
    <div class="card-inner">
      <div class="card-face card-back">
        <img src="${logoPath}" alt="WHITEBOARD">
      </div>
      <div class="card-face card-front" style="background:${card.bg};border-right:3px solid ${card.borderColor}">
        ${card.front}
        <span class="match-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></span>
      </div>
    </div>`;
  if(!isMatched){
    div.addEventListener('click',()=>flipCard(div));
  }
  grid.appendChild(div);
});

function flipCard(card){
  if(lockBoard || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  card.classList.add('flipped');
  flippedCards.push(card);
  if(flippedCards.length===2){
    lockBoard=true;
    attemptCount++;
    document.getElementById('attempts').textContent=attemptCount;
    const [a,b]=flippedCards;
    if(a.dataset.pairId===b.dataset.pairId){
      // Match!
      setTimeout(()=>{
        a.classList.add('matched');
        b.classList.add('matched');
        matchCount++;
        document.getElementById('pairsFound').textContent=matchCount;
        // Update leaderboard
        document.getElementById('score3').textContent=matchCount+'/6';
        flippedCards=[];
        lockBoard=false;
      },300);
    } else {
      // Wrong
      setTimeout(()=>{
        a.classList.add('wrong');
        b.classList.add('wrong');
        setTimeout(()=>{
          a.classList.remove('flipped','wrong');
          b.classList.remove('flipped','wrong');
          flippedCards=[];
          lockBoard=false;
        },600);
      },500);
    }
  }
}

// Timer countdown
let totalSec = 90;
const timerEl = document.getElementById('gameTimer');
setInterval(()=>{
  totalSec--;
  if(totalSec<0) totalSec=0;
  const m = String(Math.floor(totalSec/60)).padStart(2,'0');
  const s = String(totalSec%60).padStart(2,'0');
  timerEl.textContent = m+':'+s;
},1000);
</script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="he" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHITEBOARD Studio — הקלטה פעילה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #253E7A;
  --cyan: #38C4F2;
  --pink: #F05680;
  --green: #7DC57A;
  --yellow: #EAD654;
  --bg: #0a0e1a;
  --bg-secondary: #111629;
  --surface: rgba(0,0,0,0.7);
  --text: #f0f0f5;
  --text-muted: rgba(255,255,255,0.5);
  --red: #e53e3e;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ======= FULL SCREEN VIDEO AREA ======= */
.video-area {
  position: relative;
  width: 100%;
  height: 100dvh;
  background: radial-gradient(ellipse at 50% 40%, #141a35 0%, #0d1020 50%, #080b16 100%);
  display: flex;
  flex-direction: column;
}

.video-area::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 30% 60%, rgba(56,196,242,0.03) 0%, transparent 50%),
    radial-gradient(circle at 70% 30%, rgba(240,86,128,0.03) 0%, transparent 50%);
  pointer-events: none;
}

/* Grid pattern overlay */
.video-area::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

/* ======= TOP OVERLAYS ======= */
.top-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  z-index: 10;
  background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 100%);
  pointer-events: none;
}
.top-overlay > * { pointer-events: auto; }

/* Recording indicator */
.rec-indicator {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 12px;
  padding: 8px 16px;
  border: 1px solid rgba(229,62,62,0.3);
  transition: opacity 0.3s, border-color 0.3s;
}

.rec-indicator.hidden { opacity: 0; pointer-events: none; }

.rec-dot {
  width: 12px;
  height: 12px;
  background: var(--red);
  border-radius: 50%;
  animation: pulse-red 1.2s ease-in-out infinite;
}

.rec-dot.paused {
  background: var(--yellow);
  animation: pulse-yellow 1.5s ease-in-out infinite;
}

@keyframes pulse-red {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(229,62,62,0.6); }
  50% { opacity: 0.5; box-shadow: 0 0 12px 4px rgba(229,62,62,0.3); }
}

@keyframes pulse-yellow {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(234,214,84,0.5); }
  50% { opacity: 0.6; box-shadow: 0 0 12px 4px rgba(234,214,84,0.2); }
}

.rec-label {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 14px;
  color: var(--red);
  letter-spacing: 2px;
  transition: color 0.3s;
}

.rec-label.paused { color: var(--yellow); }

.rec-timer {
  font-family: 'Fredoka', monospace;
  font-weight: 500;
  font-size: 18px;
  color: var(--text);
  letter-spacing: 1px;
  min-width: 70px;
}

/* Lesson name pill */
.lesson-pill {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 8px 24px;
  border: 1px solid rgba(255,255,255,0.1);
  font-family: 'Heebo', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: rgba(255,255,255,0.8);
  white-space: nowrap;
  z-index: 10;
}

/* Brand watermark */
.watermark {
  font-family: 'Fredoka', sans-serif;
  font-weight: 700;
  font-size: 16px;
  color: rgba(255,255,255,0.15);
  letter-spacing: 2px;
}

/* ======= CAMERA OVERLAY (draggable) ======= */
.camera-overlay {
  position: absolute;
  bottom: 180px;
  left: 24px;
  width: 18vw;
  min-width: 160px;
  max-width: 280px;
  aspect-ratio: 16/9;
  background: linear-gradient(135deg, #1a1f36, #111629);
  border: 2px solid rgba(255,255,255,0.7);
  border-radius: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 12;
  cursor: grab;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: box-shadow 0.2s;
}
.camera-overlay:active { cursor: grabbing; box-shadow: 0 12px 40px rgba(0,0,0,0.7); }
.camera-overlay .cam-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: var(--text-muted);
  font-size: 12px;
}

/* ======= AUDIO LEVEL STRIP (above control bar) ======= */
.audio-strip {
  position: absolute;
  bottom: 136px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 20px;
  z-index: 16;
  opacity: 0.7;
}
.audio-strip .meter-bar {
  width: 3px;
  border-radius: 1.5px;
  background: var(--green);
  transition: height 0.1s ease;
}
.audio-strip .meter-bar:nth-child(4),
.audio-strip .meter-bar:nth-child(5) { background: var(--yellow); }
.audio-strip .meter-bar:nth-child(6),
.audio-strip .meter-bar:nth-child(7) { background: var(--red); }

/* ======= BOTTOM CONTROL BAR ======= */
.control-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.08);
  padding: 0 24px 16px;
  z-index: 15;
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* Take counter pill */
.take-pill {
  align-self: center;
  background: var(--cyan);
  color: #0a0e1a;
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 13px;
  padding: 4px 16px;
  border-radius: 20px;
  margin-top: 12px;
  margin-bottom: 8px;
  transition: transform 0.3s, opacity 0.3s;
  opacity: 0;
  transform: scale(0.8);
}
.take-pill.visible {
  opacity: 1;
  transform: scale(1);
}

/* Main TikTok-style controls row */
.tiktok-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
  min-height: 90px;
  position: relative;
}

/* Control buttons */
.ctrl-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  font-size: 11px;
  font-weight: 500;
  outline: none;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.3s, opacity 0.3s;
}
.ctrl-btn:hover { transform: scale(1.05); }
.ctrl-btn:active { transform: scale(0.95); }

/* Hidden state for buttons that come/go */
.ctrl-btn.hidden {
  opacity: 0;
  transform: scale(0.6);
  pointer-events: none;
  position: absolute;
}
.ctrl-btn.hidden-left {
  opacity: 0;
  transform: scale(0.6) translateX(40px);
  pointer-events: none;
  position: absolute;
  right: calc(50% + 60px);
}
.ctrl-btn.hidden-right {
  opacity: 0;
  transform: scale(0.6) translateX(-40px);
  pointer-events: none;
  position: absolute;
  left: calc(50% + 60px);
}

/* Center big button */
.center-btn-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}

.big-circle {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: none;
  transition: background 0.3s, box-shadow 0.3s, transform 0.3s;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}
.big-circle:hover { transform: scale(1.08); }
.big-circle:active { transform: scale(0.93); }

.big-circle.red {
  background: var(--red);
  box-shadow: 0 0 24px rgba(229,62,62,0.4);
}
.big-circle.green {
  background: var(--green);
  box-shadow: 0 0 24px rgba(125,197,122,0.4);
}

.center-label {
  font-family: 'Heebo', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  transition: color 0.3s;
}

/* Side action buttons */
.side-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  font-size: 11px;
  font-weight: 500;
  outline: none;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.3s, opacity 0.3s;
}
.side-btn:hover { transform: scale(1.05); }
.side-btn:active { transform: scale(0.95); }
.side-btn.hidden {
  opacity: 0;
  transform: scale(0.6);
  pointer-events: none;
  width: 0;
  overflow: hidden;
  margin: 0;
  gap: 0;
}

.side-icon {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s, box-shadow 0.3s;
}

.side-icon.delete {
  background: rgba(229,62,62,0.15);
  border: 2px solid rgba(229,62,62,0.4);
}
.side-btn:hover .side-icon.delete {
  background: rgba(229,62,62,0.3);
}

.side-icon.finish {
  background: rgba(229,62,62,0.2);
  border: 2px solid var(--red);
}
.side-btn:hover .side-icon.finish {
  background: rgba(229,62,62,0.35);
}

/* ======= MINI TIMELINE (bottom strip) ======= */
.mini-timeline {
  width: 100%;
  height: 22px;
  position: relative;
  display: flex;
  border-radius: 4px;
  overflow: hidden;
  background: rgba(255,255,255,0.05);
  margin-top: 10px;
}

.timeline-segment {
  height: 100%;
  position: relative;
  display: flex;
  align-items: center;
  min-width: 30px;
  transition: flex 0.3s, opacity 0.3s, min-width 0.3s;
}

.timeline-segment:nth-child(odd) { background: rgba(56,196,242,0.25); }
.timeline-segment:nth-child(even) { background: rgba(56,196,242,0.12); }
.timeline-segment.current { background: rgba(56,196,242,0.4); }

.timeline-segment.removing {
  opacity: 0;
  min-width: 0;
  flex: 0 !important;
}

.segment-label {
  font-size: 9px;
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  color: rgba(255,255,255,0.6);
  padding-right: 6px;
}

.playhead {
  position: absolute;
  top: 0;
  width: 2px;
  height: 100%;
  background: #fff;
  box-shadow: 0 0 6px rgba(255,255,255,0.5);
  transition: right 0.3s linear;
  z-index: 2;
}

/* ======= CONFIRMATION DIALOG ======= */
.dialog-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.dialog-overlay.visible { display: flex; }

.dialog {
  background: #1a1f36;
  border-radius: 20px;
  padding: 28px 32px;
  max-width: 360px;
  width: 90%;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.dialog-icon { margin-bottom: 12px; }

.dialog h3 {
  font-family: 'Fredoka', sans-serif;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}

.dialog p {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 20px;
}

.dialog-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
}

.dialog-btn {
  padding: 10px 24px;
  border-radius: 12px;
  border: none;
  font-family: 'Heebo', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  min-width: 44px;
  min-height: 44px;
  transition: transform 0.15s, opacity 0.15s;
}
.dialog-btn:hover { transform: scale(1.03); }
.dialog-btn:active { transform: scale(0.97); }

.dialog-btn.cancel {
  background: rgba(255,255,255,0.08);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.15);
}

.dialog-btn.confirm-red {
  background: var(--red);
  color: #fff;
}

.dialog-btn.confirm-green {
  background: var(--green);
  color: #0a0e1a;
}

.dialog-btn.confirm-cyan {
  background: var(--cyan);
  color: #0a0e1a;
}

/* ======= TOAST ======= */
.toast-container {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}

.toast {
  background: #1e2440;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  animation: toast-in 0.3s ease;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.toast.leaving {
  animation: toast-out 0.3s ease forwards;
}

.toast-undo {
  background: none;
  border: none;
  color: var(--cyan);
  font-family: 'Heebo', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
}
.toast-undo:hover { background: rgba(56,196,242,0.1); }

@keyframes toast-in {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes toast-out {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-10px); }
}

/* ======= KEYBOARD HINTS ======= */
kbd {
  display: inline-block;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  padding: 1px 6px;
  font-family: 'Fredoka', monospace;
  font-size: 11px;
  color: var(--text-muted);
}
</style>
</head>
<body>

<div class="video-area" id="videoArea">
  <!-- Top overlay -->
  <div class="top-overlay">
    <!-- Recording indicator (top-right in RTL = visually right) -->
    <div class="rec-indicator hidden" id="recIndicator">
      <div class="rec-dot" id="recDot"></div>
      <span class="rec-label" id="recLabel">REC</span>
      <span class="rec-timer" id="recTimer">00:00</span>
    </div>

    <!-- Brand watermark -->
    <span class="watermark">WHITEBOARD</span>
  </div>

  <!-- Lesson name pill -->
  <div class="lesson-pill">שיעור 3: צבע ומשמעות</div>

  <!-- Camera overlay (draggable) -->
  <div class="camera-overlay" id="cameraOverlay">
    <div class="cam-placeholder">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 7l-7 5 7 5V7z"/>
        <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
      </svg>
      <span>מצלמה</span>
    </div>
  </div>

  <!-- Audio level strip (above control bar) -->
  <div class="audio-strip" id="audioStrip">
    <div class="meter-bar" style="height:4px"></div>
    <div class="meter-bar" style="height:6px"></div>
    <div class="meter-bar" style="height:10px"></div>
    <div class="meter-bar" style="height:14px"></div>
    <div class="meter-bar" style="height:8px"></div>
    <div class="meter-bar" style="height:5px"></div>
    <div class="meter-bar" style="height:3px"></div>
  </div>

  <!-- Bottom control bar -->
  <div class="control-bar">
    <!-- Take counter pill -->
    <div class="take-pill" id="takePill">טייק 1</div>

    <!-- TikTok-style controls -->
    <div class="tiktok-controls" id="tiktokControls">
      <!-- Delete last take (only visible when paused) -->
      <button class="side-btn hidden" id="btnDelete" title="מחק טייק אחרון (Backspace)">
        <div class="side-icon delete">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
          </svg>
        </div>
        <span>מחק טייק אחרון</span>
      </button>

      <!-- Center big button -->
      <div class="center-btn-wrap" id="centerWrap">
        <button class="big-circle red" id="bigBtn">
          <!-- Initial: empty red circle (start recording) -->
          <!-- Recording: pause icon -->
          <!-- Paused: play icon (green) -->
        </button>
        <span class="center-label" id="centerLabel">התחל הקלטה</span>
      </div>

      <!-- Finish recording (visible during recording & paused) -->
      <button class="side-btn hidden" id="btnFinish" title="סיים הקלטה (Esc)">
        <div class="side-icon finish">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
            <rect x="3" y="3" width="14" height="14" rx="2" fill="currentColor"/>
          </svg>
        </div>
        <span>סיים הקלטה</span>
      </button>
    </div>

    <!-- Mini timeline -->
    <div class="mini-timeline" id="miniTimeline">
      <!-- Segments injected by JS -->
    </div>
  </div>
</div>

<!-- Delete Take Dialog -->
<div class="dialog-overlay" id="dialogDeleteTake">
  <div class="dialog">
    <div class="dialog-icon">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="22" fill="rgba(229,62,62,0.15)" stroke="#e53e3e" stroke-width="2"/>
        <path d="M16 18h16M20 18v-2a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M30 18v14a2 2 0 0 1-2 2H20a2 2 0 0 1-2-2V18" stroke="#e53e3e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h3 id="deleteDialogTitle">למחוק את הטייק האחרון?</h3>
    <p id="deleteDialogDesc">(0:00)</p>
    <div class="dialog-actions">
      <button class="dialog-btn cancel" onclick="closeDialog('dialogDeleteTake')">ביטול</button>
      <button class="dialog-btn confirm-red" onclick="confirmDeleteTake()">מחק</button>
    </div>
  </div>
</div>

<!-- Stop Recording Dialog -->
<div class="dialog-overlay" id="dialogStop">
  <div class="dialog">
    <div class="dialog-icon">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="22" fill="rgba(56,196,242,0.1)" stroke="#38C4F2" stroke-width="2"/>
        <rect x="16" y="16" width="16" height="16" rx="3" fill="#38C4F2"/>
      </svg>
    </div>
    <h3>לסיים את ההקלטה?</h3>
    <p id="stopDialogDesc">משך כולל: 00:00</p>
    <div class="dialog-actions">
      <button class="dialog-btn cancel" onclick="closeDialog('dialogStop')">המשך הקלטה</button>
      <button class="dialog-btn confirm-green" onclick="confirmStop()">סיים ושמור</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ======= STATE =======
// States: 'initial' | 'recording' | 'paused' | 'done'
const state = {
  phase: 'initial',
  seconds: 0,
  takeNum: 0,
  takes: [],
  intervalId: null,
  meterIntervalId: null,
};

// ======= ELEMENTS =======
const $ = id => document.getElementById(id);
const recDot = $('recDot');
const recLabel = $('recLabel');
const recTimer = $('recTimer');
const recIndicator = $('recIndicator');
const bigBtn = $('bigBtn');
const centerLabel = $('centerLabel');
const btnDelete = $('btnDelete');
const btnFinish = $('btnFinish');
const takePill = $('takePill');
const miniTimeline = $('miniTimeline');
const audioStrip = $('audioStrip');
const cameraOverlay = $('cameraOverlay');

// ======= TIMER =======
function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

function tick() {
  if (state.phase === 'recording') {
    state.seconds++;
    if (state.takes.length > 0) {
      state.takes[state.takes.length - 1].duration++;
    }
    updateTimerDisplay();
    updateTimeline();
  }
}

function startTimer() {
  if (state.intervalId) clearInterval(state.intervalId);
  state.intervalId = setInterval(tick, 1000);
}

function updateTimerDisplay() {
  recTimer.textContent = formatTime(state.seconds);
}

// ======= RENDER CONTROLS BY STATE =======
function renderControls() {
  const phase = state.phase;

  // REC indicator
  if (phase === 'initial' || phase === 'done') {
    recIndicator.classList.add('hidden');
  } else {
    recIndicator.classList.remove('hidden');
  }

  // REC dot & label
  if (phase === 'recording') {
    recDot.classList.remove('paused');
    recDot.style.animation = '';
    recDot.style.background = '';
    recLabel.classList.remove('paused');
    recLabel.textContent = 'REC';
  } else if (phase === 'paused') {
    recDot.classList.add('paused');
    recLabel.classList.add('paused');
    recLabel.textContent = 'PAUSED';
  } else if (phase === 'done') {
    recDot.style.animation = 'none';
    recDot.style.background = 'var(--green)';
    recLabel.textContent = 'DONE';
    recLabel.classList.remove('paused');
  }

  // Big center button
  if (phase === 'initial') {
    bigBtn.className = 'big-circle red';
    bigBtn.innerHTML = '';
    centerLabel.textContent = 'התחל הקלטה';
  } else if (phase === 'recording') {
    bigBtn.className = 'big-circle red';
    bigBtn.innerHTML = `<svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect x="7" y="5" width="4.5" height="18" rx="1.5" fill="#fff"/>
      <rect x="16.5" y="5" width="4.5" height="18" rx="1.5" fill="#fff"/>
    </svg>`;
    centerLabel.textContent = 'עצור';
  } else if (phase === 'paused') {
    bigBtn.className = 'big-circle green';
    bigBtn.innerHTML = `<svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <path d="M10 5.5L23 14L10 22.5V5.5Z" fill="#0a0e1a"/>
    </svg>`;
    centerLabel.textContent = 'המשך';
  } else if (phase === 'done') {
    bigBtn.className = 'big-circle red';
    bigBtn.style.opacity = '0.4';
    bigBtn.style.pointerEvents = 'none';
    bigBtn.innerHTML = '';
    centerLabel.textContent = 'ההקלטה הסתיימה';
  }

  // Delete button (only when paused & more than 1 take)
  if (phase === 'paused' && state.takes.length >= 1) {
    btnDelete.classList.remove('hidden');
  } else {
    btnDelete.classList.add('hidden');
  }

  // Finish button (recording or paused)
  if (phase === 'recording' || phase === 'paused') {
    btnFinish.classList.remove('hidden');
  } else {
    btnFinish.classList.add('hidden');
  }

  // Take pill
  if (state.takeNum >= 1) {
    takePill.textContent = `טייק ${state.takeNum}`;
    takePill.classList.add('visible');
  } else {
    takePill.classList.remove('visible');
  }
}

// ======= STATE TRANSITIONS =======
function startRecording() {
  state.phase = 'recording';
  state.takeNum = 1;
  state.takes = [{ start: 0, duration: 0 }];
  startTimer();
  state.meterIntervalId = setInterval(animateMeter, 100);
  renderControls();
  updateTimeline();
  showToast('ההקלטה התחילה', 'red');
}

function pauseRecording() {
  // Pressing "stop" during recording = pause (creates take boundary)
  state.phase = 'paused';
  renderControls();
  showToast('ההקלטה מושהית', 'yellow');
}

function resumeRecording() {
  // Resume = start new take
  state.takeNum++;
  state.takes.push({ start: state.seconds, duration: 0 });
  state.phase = 'recording';
  renderControls();
  updateTimeline();
  showToast(`טייק ${state.takeNum} התחיל`, 'cyan');
}

function handleCenterButton() {
  if (state.phase === 'initial') {
    startRecording();
  } else if (state.phase === 'recording') {
    pauseRecording();
  } else if (state.phase === 'paused') {
    resumeRecording();
  }
}

// ======= DELETE TAKE =======
function requestDeleteTake() {
  if (state.phase !== 'paused') return;
  if (state.takes.length < 1) return;
  const lastTake = state.takes[state.takes.length - 1];
  $('deleteDialogTitle').textContent = `למחוק את הטייק האחרון? (${formatTime(lastTake.duration)})`;
  $('deleteDialogDesc').textContent = `טייק ${state.takeNum}`;
  $('dialogDeleteTake').classList.add('visible');
}

function confirmDeleteTake() {
  closeDialog('dialogDeleteTake');
  const deletedTake = state.takes.pop();
  state.seconds -= deletedTake.duration;
  state.takeNum--;
  updateTimerDisplay();

  // Animate segment removal
  const segments = miniTimeline.querySelectorAll('.timeline-segment');
  const lastSeg = segments[segments.length - 1];
  if (lastSeg) {
    lastSeg.classList.add('removing');
    setTimeout(() => {
      updateTimeline();
    }, 300);
  } else {
    updateTimeline();
  }

  renderControls();
  showToast(`טייק ${state.takeNum + 1} נמחק`, 'red', true);

  // If no takes left, go back to initial
  if (state.takes.length === 0) {
    state.phase = 'initial';
    state.takeNum = 0;
    state.seconds = 0;
    clearInterval(state.intervalId);
    clearInterval(state.meterIntervalId);
    renderControls();
    updateTimeline();
  }
}

// ======= STOP / FINISH =======
function requestStop() {
  $('stopDialogDesc').textContent = `משך כולל: ${formatTime(state.seconds)}`;
  $('dialogStop').classList.add('visible');
  // Auto-pause if recording
  if (state.phase === 'recording') {
    state.phase = 'paused';
    renderControls();
  }
}

function confirmStop() {
  closeDialog('dialogStop');
  state.phase = 'done';
  clearInterval(state.intervalId);
  clearInterval(state.meterIntervalId);
  renderControls();
  showToast('ההקלטה נשמרה בהצלחה', 'green');
}

// ======= DIALOGS =======
function closeDialog(id) {
  $(id).classList.remove('visible');
}

// close dialog on overlay click
document.querySelectorAll('.dialog-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) el.classList.remove('visible');
  });
});

// ======= TIMELINE =======
function updateTimeline() {
  const total = Math.max(state.seconds, 1);
  let html = '';
  state.takes.forEach((take, i) => {
    const isCurrent = i === state.takes.length - 1;
    html += `<div class="timeline-segment${isCurrent ? ' current' : ''}" style="flex:${take.duration || 1}">
      <span class="segment-label">${i + 1}</span>
    </div>`;
  });
  if (state.takes.length > 0) {
    html += `<div class="playhead" style="left:auto;right:0"></div>`;
  }
  miniTimeline.innerHTML = html;
}

// ======= AUDIO METER =======
function animateMeter() {
  const bars = audioStrip.querySelectorAll('.meter-bar');
  bars.forEach((bar, i) => {
    if (state.phase !== 'recording') {
      bar.style.height = '2px';
      return;
    }
    const bases = [8, 12, 16, 14, 10, 7, 4];
    const h = Math.max(2, bases[i] + Math.random() * 10 - 3);
    bar.style.height = h + 'px';
  });
}

// ======= TOASTS =======
function showToast(msg, color, withUndo) {
  const container = $('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';

  const colors = {
    cyan: 'var(--cyan)', red: 'var(--red)', green: 'var(--green)',
    yellow: 'var(--yellow)', pink: 'var(--pink)'
  };
  toast.style.borderColor = colors[color] || 'rgba(255,255,255,0.12)';

  let inner = `<span style="color:${colors[color] || '#fff'}">${msg}</span>`;
  if (withUndo) {
    inner += `<button class="toast-undo" onclick="undoDelete(this)">ביטול</button>`;
  }
  toast.innerHTML = inner;
  container.appendChild(toast);

  const timeout = withUndo ? 3000 : 2000;
  setTimeout(() => {
    toast.classList.add('leaving');
    setTimeout(() => toast.remove(), 300);
  }, timeout);
}

function undoDelete(btn) {
  state.takeNum++;
  state.takes.push({ start: state.seconds, duration: 0 });
  renderControls();
  updateTimeline();
  const toastEl = btn.closest('.toast');
  if (toastEl) {
    toastEl.classList.add('leaving');
    setTimeout(() => toastEl.remove(), 300);
  }
  showToast('הטייק שוחזר', 'cyan');
}

// ======= BUTTON EVENTS =======
bigBtn.addEventListener('click', handleCenterButton);

btnDelete.addEventListener('click', () => {
  if (state.phase === 'paused') requestDeleteTake();
});

btnFinish.addEventListener('click', () => {
  if (state.phase === 'recording' || state.phase === 'paused') requestStop();
});

// ======= KEYBOARD SHORTCUTS =======
document.addEventListener('keydown', e => {
  const dialogOpen = document.querySelector('.dialog-overlay.visible');

  if (e.key === 'Escape') {
    if (dialogOpen) {
      dialogOpen.classList.remove('visible');
      // If we paused for stop dialog, keep paused state
    } else if (state.phase === 'recording' || state.phase === 'paused') {
      requestStop();
    }
    return;
  }

  if (dialogOpen) return;

  if (e.code === 'Space') {
    e.preventDefault();
    handleCenterButton();
  }
  if (e.key === 'Backspace' || e.key === 'Delete') {
    if (state.phase === 'paused') requestDeleteTake();
  }
});

// ======= DRAGGABLE CAMERA OVERLAY =======
(function initDrag() {
  let isDragging = false;
  let offsetX = 0, offsetY = 0;

  cameraOverlay.addEventListener('mousedown', e => {
    isDragging = true;
    const rect = cameraOverlay.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    cameraOverlay.style.transition = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const parent = cameraOverlay.parentElement.getBoundingClientRect();
    let x = e.clientX - parent.left - offsetX;
    let y = e.clientY - parent.top - offsetY;
    // Clamp to parent
    const w = cameraOverlay.offsetWidth;
    const h = cameraOverlay.offsetHeight;
    x = Math.max(0, Math.min(x, parent.width - w));
    y = Math.max(0, Math.min(y, parent.height - h));
    cameraOverlay.style.left = x + 'px';
    cameraOverlay.style.top = y + 'px';
    cameraOverlay.style.bottom = 'auto';
    cameraOverlay.style.right = 'auto';
  });

  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      cameraOverlay.style.transition = '';
    }
  });

  // Touch support
  cameraOverlay.addEventListener('touchstart', e => {
    isDragging = true;
    const touch = e.touches[0];
    const rect = cameraOverlay.getBoundingClientRect();
    offsetX = touch.clientX - rect.left;
    offsetY = touch.clientY - rect.top;
    cameraOverlay.style.transition = 'none';
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const touch = e.touches[0];
    const parent = cameraOverlay.parentElement.getBoundingClientRect();
    let x = touch.clientX - parent.left - offsetX;
    let y = touch.clientY - parent.top - offsetY;
    const w = cameraOverlay.offsetWidth;
    const h = cameraOverlay.offsetHeight;
    x = Math.max(0, Math.min(x, parent.width - w));
    y = Math.max(0, Math.min(y, parent.height - h));
    cameraOverlay.style.left = x + 'px';
    cameraOverlay.style.top = y + 'px';
    cameraOverlay.style.bottom = 'auto';
    cameraOverlay.style.right = 'auto';
  }, { passive: false });

  document.addEventListener('touchend', () => {
    isDragging = false;
    cameraOverlay.style.transition = '';
  });
})();

// ======= INIT =======
state.meterIntervalId = setInterval(animateMeter, 100);
renderControls();
updateTimeline();
</script>

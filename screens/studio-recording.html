<!DOCTYPE html>
<html dir="rtl" lang="he" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHITEBOARD Studio — הקלטה פעילה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #253E7A;
  --cyan: #38C4F2;
  --pink: #F05680;
  --green: #22c55e;
  --yellow: #EAD654;
  --amber: #f59e0b;
  --bg: #0a0e1a;
  --bg-secondary: #111629;
  --surface: rgba(0,0,0,0.7);
  --surface-panel: rgba(15,22,42,0.92);
  --text: #f0f0f5;
  --text-muted: rgba(255,255,255,0.5);
  --text-dim: rgba(255,255,255,0.35);
  --red: #e53e3e;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-pill: 100px;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ======= FULL SCREEN VIDEO AREA ======= */
.video-area {
  position: relative;
  width: 100%;
  height: 100dvh;
  background: radial-gradient(ellipse at 50% 40%, #141a35 0%, #0d1020 50%, #080b16 100%);
  display: flex;
  flex-direction: column;
}

.video-area::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 30% 60%, rgba(56,196,242,0.03) 0%, transparent 50%),
    radial-gradient(circle at 70% 30%, rgba(240,86,128,0.02) 0%, transparent 50%);
  pointer-events: none;
}

/* Subtle grid pattern */
.video-area::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
  background-size: 64px 64px;
  pointer-events: none;
  opacity: 0.6;
}

/* ======= SCREEN SHARE BACKGROUND ======= */
.screen-share-bg {
  display: none;
  position: absolute;
  inset: 0;
  z-index: 1;
  align-items: center;
  justify-content: center;
  background: #111629;
}
.screen-share-bg.visible { display: flex; }
.screen-share-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  color: var(--text-muted);
  font-size: 14px;
}
.screen-share-placeholder svg { opacity: 0.4; }
.screen-share-window {
  width: 70%;
  max-width: 800px;
  aspect-ratio: 16/9;
  background: #1a1f36;
  border-radius: var(--radius-md);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.screen-share-titlebar {
  height: 28px;
  background: rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 6px;
}
.screen-share-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.screen-share-dot.r { background: #e53e3e; }
.screen-share-dot.y { background: #EAD654; }
.screen-share-dot.g { background: #22c55e; }
.screen-share-content {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 13px;
  gap: 8px;
}

/* ======= TOP OVERLAY — GRADIENT FADE ======= */
.top-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  z-index: 10;
  background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.2) 60%, transparent 100%);
  pointer-events: none;
  min-height: 80px;
}
.top-overlay > * { pointer-events: auto; }

/* Recording indicator — pill */
.rec-indicator {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: var(--radius-pill);
  padding: 8px 18px 8px 14px;
  border: 1px solid rgba(229,62,62,0.25);
  transition: opacity 0.3s var(--ease-smooth), border-color 0.3s var(--ease-smooth), transform 0.3s var(--ease-out);
  transform: translateY(0);
}

.rec-indicator.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateY(-8px);
}

.rec-indicator.state-paused {
  border-color: rgba(245,158,11,0.3);
}

.rec-dot {
  width: 10px;
  height: 10px;
  background: var(--red);
  border-radius: 50%;
  animation: pulse-dot 1.4s ease-in-out infinite;
  flex-shrink: 0;
}

.rec-dot.paused {
  background: var(--amber);
  animation: pulse-dot-amber 1.8s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.4; }
}

@keyframes pulse-dot-amber {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.2); opacity: 0.5; }
}

.rec-label {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 13px;
  color: var(--red);
  letter-spacing: 2px;
  transition: color 0.3s var(--ease-smooth);
}

.rec-label.paused { color: var(--amber); }

.rec-timer {
  font-family: 'Fredoka', sans-serif;
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  font-size: 26px;
  color: var(--text);
  letter-spacing: 1.5px;
  min-width: 80px;
  line-height: 1;
}

/* Lesson name pill — floats center top, clear of everything */
.lesson-pill {
  position: absolute;
  top: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: var(--radius-pill);
  padding: 6px 20px;
  border: 1px solid rgba(255,255,255,0.08);
  font-family: 'Heebo', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.7);
  white-space: nowrap;
  z-index: 10;
}

/* Brand watermark */
.watermark {
  font-family: 'Fredoka', sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: rgba(255,255,255,0.1);
  letter-spacing: 3px;
}

/* ======= MODE SWITCHER — floating pill ======= */
.mode-switcher {
  position: absolute;
  top: 72px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: var(--radius-pill);
  padding: 4px;
  border: 1px solid rgba(255,255,255,0.08);
  z-index: 10;
  gap: 2px;
}

.mode-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border: none;
  border-radius: var(--radius-pill);
  font-family: 'Heebo', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  background: transparent;
  color: rgba(255,255,255,0.4);
  transition: background 0.25s var(--ease-smooth), color 0.25s var(--ease-smooth), box-shadow 0.25s var(--ease-smooth);
  outline: none;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.mode-btn:hover {
  color: rgba(255,255,255,0.65);
  background: rgba(255,255,255,0.06);
}
.mode-btn.active {
  background: var(--cyan);
  color: #fff;
  box-shadow: 0 2px 16px rgba(56,196,242,0.3);
}
.mode-btn svg {
  flex-shrink: 0;
}

/* ======= CAMERA OVERLAY (draggable PiP) ======= */
.camera-overlay {
  position: absolute;
  bottom: 200px;
  left: 24px;
  width: 18vw;
  min-width: 160px;
  max-width: 260px;
  aspect-ratio: 16/9;
  background: linear-gradient(135deg, #1a1f36, #111629);
  border: 2px solid rgba(255,255,255,0.6);
  border-radius: var(--radius-md);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  z-index: 12;
  cursor: grab;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: box-shadow 0.2s var(--ease-smooth), opacity 0.3s var(--ease-smooth), transform 0.3s var(--ease-out);
}
.camera-overlay:active { cursor: grabbing; box-shadow: 0 12px 40px rgba(0,0,0,0.7); }
.camera-overlay .cam-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  color: var(--text-muted);
  font-size: 11px;
}

.camera-overlay.full-mode { display: none; }
.camera-overlay.pip-mode { display: flex; }
.camera-overlay.hidden-mode { display: none; }

/* ======= AUDIO LEVEL STRIP — subtle, above control bar ======= */
.audio-strip {
  position: absolute;
  bottom: 144px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 18px;
  z-index: 16;
  opacity: 0.45;
  transition: opacity 0.3s var(--ease-smooth);
}
.audio-strip.active { opacity: 0.6; }
.audio-strip .meter-bar {
  width: 3px;
  border-radius: 1.5px;
  background: var(--green);
  transition: height 0.08s ease-out;
}
.audio-strip .meter-bar:nth-child(5) { background: var(--yellow); }
.audio-strip .meter-bar:nth-child(6) { background: var(--amber); }
.audio-strip .meter-bar:nth-child(7) { background: var(--red); }

/* ======= BOTTOM CONTROL BAR ======= */
.control-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid rgba(255,255,255,0.06);
  padding: 0 24px 20px;
  z-index: 15;
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* Take counter pill — centered above controls */
.take-pill {
  align-self: center;
  background: var(--cyan);
  color: #0a0e1a;
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 13px;
  padding: 4px 16px;
  border-radius: var(--radius-pill);
  margin-top: 12px;
  margin-bottom: 4px;
  transition: transform 0.3s var(--ease-out), opacity 0.3s var(--ease-out);
  opacity: 0;
  transform: scale(0.8) translateY(4px);
}
.take-pill.visible {
  opacity: 1;
  transform: scale(1) translateY(0);
}

/* ======= TIKTOK-STYLE CONTROLS ROW ======= */
.tiktok-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 32px;
  min-height: 96px;
  position: relative;
}

/* Side action buttons (delete, finish) */
.side-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text);
  outline: none;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.25s var(--ease-out), opacity 0.25s var(--ease-out);
}
.side-btn:hover { transform: scale(1.06); }
.side-btn:active { transform: scale(0.94); }

.side-btn .side-label {
  font-family: 'Heebo', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  white-space: nowrap;
}

.side-btn.hidden {
  opacity: 0;
  transform: scale(0.6);
  pointer-events: none;
  width: 0;
  overflow: hidden;
  margin: 0;
  gap: 0;
}

.side-icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.25s var(--ease-smooth), box-shadow 0.25s var(--ease-smooth), border-color 0.25s var(--ease-smooth);
}

.side-icon.delete {
  background: rgba(229,62,62,0.12);
  border: 1.5px solid rgba(229,62,62,0.35);
}
.side-btn:hover .side-icon.delete {
  background: rgba(229,62,62,0.22);
  border-color: rgba(229,62,62,0.5);
}

.side-icon.finish {
  background: rgba(229,62,62,0.15);
  border: 1.5px solid rgba(229,62,62,0.6);
}
.side-btn:hover .side-icon.finish {
  background: rgba(229,62,62,0.28);
  box-shadow: 0 0 16px rgba(229,62,62,0.2);
}

/* ======= CENTER BIG BUTTON ======= */
.center-btn-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.big-circle {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: none;
  transition: background 0.3s var(--ease-smooth), box-shadow 0.3s var(--ease-smooth), transform 0.2s var(--ease-out);
  outline: none;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.big-circle:hover { transform: scale(1.08); }
.big-circle:active { transform: scale(0.92); }

.big-circle.red {
  background: var(--red);
  box-shadow: 0 0 0 4px rgba(229,62,62,0.15), 0 4px 24px rgba(229,62,62,0.35);
}
.big-circle.green {
  background: var(--green);
  box-shadow: 0 0 0 4px rgba(34,197,94,0.15), 0 4px 24px rgba(34,197,94,0.35);
}

/* Outer ring animation for recording state */
.big-circle.red.recording {
  animation: ring-pulse 2s ease-in-out infinite;
}

@keyframes ring-pulse {
  0%, 100% { box-shadow: 0 0 0 4px rgba(229,62,62,0.15), 0 4px 24px rgba(229,62,62,0.35); }
  50% { box-shadow: 0 0 0 8px rgba(229,62,62,0.08), 0 4px 32px rgba(229,62,62,0.25); }
}

.center-label {
  font-family: 'Heebo', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  transition: color 0.3s var(--ease-smooth);
  white-space: nowrap;
}

/* ======= MINI TIMELINE ======= */
.mini-timeline {
  width: 100%;
  height: 4px;
  position: relative;
  display: flex;
  border-radius: 2px;
  overflow: hidden;
  background: rgba(255,255,255,0.04);
  margin-top: 8px;
  transition: height 0.3s var(--ease-out), margin-top 0.3s var(--ease-out);
}
.mini-timeline.expanded {
  height: 28px;
  border-radius: 6px;
  margin-top: 12px;
}

.timeline-segment {
  height: 100%;
  position: relative;
  display: flex;
  align-items: center;
  min-width: 24px;
  transition: flex 0.3s var(--ease-out), opacity 0.3s var(--ease-out), min-width 0.3s var(--ease-out);
  cursor: pointer;
}

.timeline-segment:nth-child(odd) { background: rgba(56,196,242,0.2); }
.timeline-segment:nth-child(even) { background: rgba(56,196,242,0.1); }
.timeline-segment.current { background: rgba(56,196,242,0.35); }

.timeline-segment.removing {
  opacity: 0;
  min-width: 0;
  flex: 0 !important;
}

.segment-label {
  font-size: 10px;
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  padding-right: 8px;
  opacity: 0;
  transition: opacity 0.2s var(--ease-smooth);
}
.mini-timeline.expanded .segment-label {
  opacity: 1;
}

/* Insert take button between segments */
.timeline-insert-btn {
  width: 16px;
  min-width: 16px;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: rgba(56,196,242,0.06);
  border: none;
  padding: 0;
  position: relative;
  transition: background 0.2s var(--ease-smooth);
}
.timeline-insert-btn:hover {
  background: rgba(56,196,242,0.2);
}
.timeline-insert-btn svg {
  opacity: 0.4;
  transition: opacity 0.2s var(--ease-smooth);
}
.timeline-insert-btn:hover svg {
  opacity: 1;
}
.timeline-insert-btn .insert-tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface-panel);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius-sm);
  padding: 6px 12px;
  font-size: 11px;
  font-family: 'Heebo', sans-serif;
  white-space: nowrap;
  color: var(--text);
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  z-index: 20;
}
.timeline-insert-btn:hover .insert-tooltip {
  display: block;
}

.playhead {
  position: absolute;
  top: 0;
  width: 2px;
  height: 100%;
  background: #fff;
  box-shadow: 0 0 6px rgba(255,255,255,0.4);
  transition: right 0.3s linear;
  z-index: 2;
}

/* ======= TAKES PANEL — slides up smoothly ======= */
.takes-panel {
  background: var(--surface-panel);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: var(--radius-md);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 12px 16px;
  margin-top: 8px;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transform: translateY(8px);
  transition: max-height 0.3s var(--ease-out), opacity 0.25s var(--ease-out), transform 0.25s var(--ease-out), padding 0.3s var(--ease-out), margin-top 0.3s var(--ease-out);
  padding-top: 0;
  padding-bottom: 0;
  margin-top: 0;
}
.takes-panel.visible {
  max-height: 200px;
  opacity: 1;
  transform: translateY(0);
  padding: 12px 16px;
  margin-top: 8px;
  overflow-y: auto;
}

.takes-panel-title {
  font-family: 'Fredoka', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--cyan);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.take-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.03);
  margin-bottom: 4px;
  transition: background 0.15s var(--ease-smooth);
}
.take-row:hover {
  background: rgba(255,255,255,0.06);
}
.take-row:last-child { margin-bottom: 0; }

.take-number {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 13px;
  color: var(--cyan);
  min-width: 20px;
  text-align: center;
}

.take-duration {
  font-family: 'Fredoka', sans-serif;
  font-variant-numeric: tabular-nums;
  font-size: 12px;
  color: var(--text-muted);
  min-width: 42px;
}

.take-note-input {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 6px;
  padding: 5px 10px;
  font-family: 'Heebo', sans-serif;
  font-size: 12px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s var(--ease-smooth), background 0.2s var(--ease-smooth);
}
.take-note-input:focus {
  border-color: var(--cyan);
  background: rgba(56,196,242,0.04);
}
.take-note-input::placeholder {
  color: var(--text-dim);
}

/* ======= CONFIRMATION DIALOG ======= */
.dialog-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s var(--ease-smooth);
}
.dialog-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

.dialog {
  background: #1a1f36;
  border-radius: 20px;
  padding: 28px 32px;
  max-width: 360px;
  width: 90%;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  transform: scale(0.95) translateY(8px);
  transition: transform 0.2s var(--ease-out);
}
.dialog-overlay.visible .dialog {
  transform: scale(1) translateY(0);
}

.dialog-icon { margin-bottom: 16px; }

.dialog h3 {
  font-family: 'Fredoka', sans-serif;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}

.dialog p {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 24px;
}

.dialog-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
}

.dialog-btn {
  padding: 10px 24px;
  border-radius: var(--radius-md);
  border: none;
  font-family: 'Heebo', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  min-width: 44px;
  min-height: 44px;
  transition: transform 0.15s var(--ease-out), opacity 0.15s var(--ease-smooth);
}
.dialog-btn:hover { transform: scale(1.03); }
.dialog-btn:active { transform: scale(0.97); }

.dialog-btn.cancel {
  background: rgba(255,255,255,0.06);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.12);
}

.dialog-btn.confirm-red {
  background: var(--red);
  color: #fff;
}

.dialog-btn.confirm-green {
  background: var(--green);
  color: #0a0e1a;
}

.dialog-btn.confirm-cyan {
  background: var(--cyan);
  color: #0a0e1a;
}

/* ======= TOAST ======= */
.toast-container {
  position: fixed;
  top: 120px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}

.toast {
  background: var(--surface-panel);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-pill);
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  animation: toast-in 0.3s var(--ease-out);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

.toast.leaving {
  animation: toast-out 0.25s var(--ease-smooth) forwards;
}

.toast-undo {
  background: none;
  border: none;
  color: var(--cyan);
  font-family: 'Heebo', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
}
.toast-undo:hover { background: rgba(56,196,242,0.1); }

@keyframes toast-in {
  from { opacity: 0; transform: translateY(-10px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes toast-out {
  from { opacity: 1; transform: translateY(0) scale(1); }
  to { opacity: 0; transform: translateY(-10px) scale(0.95); }
}

/* ======= KEYBOARD HINTS ======= */
kbd {
  display: inline-block;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px;
  padding: 1px 6px;
  font-family: 'Fredoka', monospace;
  font-size: 11px;
  color: var(--text-dim);
}

/* ======= SCROLLBAR ======= */
.takes-panel::-webkit-scrollbar { width: 3px; }
.takes-panel::-webkit-scrollbar-track { background: transparent; }
.takes-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>
<body>

  <!-- Audio level strip -->

  <!-- Bottom control bar -->

<!-- Delete Take Dialog -->

  <div class="dialog">

      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="22" fill="rgba(229,62,62,0.12)" stroke="#e53e3e" stroke-width="1.5"/>
        <path d="M16 18h16M20 18v-2a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M30 18v14a2 2 0 0 1-2 2H20a2 2 0 0 1-2-2V18" stroke="#e53e3e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

<!-- Stop Recording Dialog -->
<div class="dialog-overlay" id="dialogStop">
  <div class="dialog">

        <circle cx="24" cy="24" r="22" fill="rgba(56,196,242,0.08)" stroke="#38C4F2" stroke-width="1.5"/>
        <rect x="16" y="16" width="16" height="16" rx="3" fill="#38C4F2"/>

      <button class="dialog-btn confirm-green" onclick="confirmStop()">סיים ושמור</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ======= STATE =======
const state = {
  phase: 'initial',
  seconds: 0,
  takeNum: 0,
  takes: [],
  intervalId: null,
  meterIntervalId: null,
  currentMode: 'camera',
};

const demoNotes = ['יצא סבבה', 'פתיח טוב', 'מבוא ויסודות'];

// ======= ELEMENTS =======
const $ = id => document.getElementById(id);
const recDot = $('recDot');
const recLabel = $('recLabel');
const recTimer = $('recTimer');
const recIndicator = $('recIndicator');
const bigBtn = $('bigBtn');
const centerLabel = $('centerLabel');
const btnDelete = $('btnDelete');
const btnFinish = $('btnFinish');
const takePill = $('takePill');
const miniTimeline = $('miniTimeline');
const audioStrip = $('audioStrip');
const cameraOverlay = $('cameraOverlay');
const screenShareBg = $('screenShareBg');
const takesPanel = $('takesPanel');
const takesList = $('takesList');

// ======= TIMER =======
function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

function tick() {
  if (state.phase === 'recording') {
    state.seconds++;
    if (state.takes.length > 0) {
      state.takes[state.takes.length - 1].duration++;
    }
    updateTimerDisplay();
    updateTimeline();
  }
}

function startTimer() {
  if (state.intervalId) clearInterval(state.intervalId);
  state.intervalId = setInterval(tick, 1000);
}

function updateTimerDisplay() {
  recTimer.textContent = formatTime(state.seconds);
}

// ======= MODE SWITCHER =======
function setMode(mode) {
  state.currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });

  if (mode === 'camera') {
    screenShareBg.classList.remove('visible');
    cameraOverlay.style.display = 'none';
  } else if (mode === 'screen-cam') {
    screenShareBg.classList.add('visible');
    cameraOverlay.style.display = 'flex';
  } else if (mode === 'screen') {
    screenShareBg.classList.add('visible');
    cameraOverlay.style.display = 'none';
  }

  const modeNames = { camera: 'מצלמה', 'screen-cam': 'מסך + מצלמה', screen: 'מסך' };
  if (state.phase !== 'initial') {
    showToast(`מצב: ${modeNames[mode]}`, 'cyan');
  }
}

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => setMode(btn.dataset.mode));
});

// ======= RENDER CONTROLS BY STATE =======
function renderControls() {
  const phase = state.phase;

  // REC indicator
  if (phase === 'initial' || phase === 'done') {
    recIndicator.classList.add('hidden');
  } else {
    recIndicator.classList.remove('hidden');
  }

  // REC indicator border color for state
  recIndicator.classList.toggle('state-paused', phase === 'paused');

  // REC dot & label
  if (phase === 'recording') {
    recDot.classList.remove('paused');
    recDot.style.animation = '';
    recDot.style.background = '';
    recLabel.classList.remove('paused');
    recLabel.textContent = 'REC';
  } else if (phase === 'paused') {
    recDot.classList.add('paused');
    recLabel.classList.add('paused');
    recLabel.textContent = 'PAUSED';
  } else if (phase === 'done') {
    recDot.style.animation = 'none';
    recDot.style.background = 'var(--green)';
    recLabel.textContent = 'DONE';
    recLabel.classList.remove('paused');
    recLabel.style.color = 'var(--green)';
  }

  // Audio strip
  audioStrip.classList.toggle('active', phase === 'recording');

  // Big center button
  if (phase === 'initial') {
    bigBtn.className = 'big-circle red';
    bigBtn.innerHTML = '';
    centerLabel.textContent = 'התחל הקלטה';
    centerLabel.style.color = '';
  } else if (phase === 'recording') {
    bigBtn.className = 'big-circle red recording';
    bigBtn.innerHTML = `<svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <rect x="7" y="6" width="4.5" height="16" rx="1.5" fill="#fff"/>
      <rect x="16.5" y="6" width="4.5" height="16" rx="1.5" fill="#fff"/>
    </svg>`;
    centerLabel.textContent = 'השהה';
    centerLabel.style.color = '';
  } else if (phase === 'paused') {
    bigBtn.className = 'big-circle green';
    bigBtn.innerHTML = `<svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <path d="M10 5.5L23 14L10 22.5V5.5Z" fill="#0a0e1a"/>
    </svg>`;
    centerLabel.textContent = 'המשך הקלטה';
    centerLabel.style.color = 'var(--green)';
  } else if (phase === 'done') {
    bigBtn.className = 'big-circle red';
    bigBtn.style.opacity = '0.3';
    bigBtn.style.pointerEvents = 'none';
    bigBtn.innerHTML = '';
    centerLabel.textContent = 'ההקלטה הסתיימה';
    centerLabel.style.color = 'var(--green)';
  }

  // Delete button
  if (phase === 'paused' && state.takes.length >= 1) {
    btnDelete.classList.remove('hidden');
  } else {
    btnDelete.classList.add('hidden');
  }

  // Finish button
  if (phase === 'recording' || phase === 'paused') {
    btnFinish.classList.remove('hidden');
  } else {
    btnFinish.classList.add('hidden');
  }

  // Take pill
  if (state.takeNum >= 1) {
    takePill.textContent = `טייק ${state.takeNum}`;
    takePill.classList.add('visible');
  } else {
    takePill.classList.remove('visible');
  }

  // Takes panel & timeline expansion
  if (phase === 'paused' && state.takes.length > 0) {
    takesPanel.classList.add('visible');
    miniTimeline.classList.add('expanded');
    renderTakesPanel();
  } else {
    takesPanel.classList.remove('visible');
    miniTimeline.classList.remove('expanded');
  }
}

// ======= TAKES PANEL =======
function renderTakesPanel() {
  let html = '';
  state.takes.forEach((take, i) => {
    const value = take.note || (demoNotes[i] !== undefined ? demoNotes[i] : '');
    const placeholder = 'הוסף הערה...';
    html += `<div class="take-row">
      <span class="take-number">${i + 1}</span>
      <span class="take-duration">${formatTime(take.duration)}</span>
      <input class="take-note-input" type="text" value="${escapeHtml(value)}" placeholder="${escapeHtml(placeholder)}" data-take-index="${i}" />
    </div>`;
  });
  takesList.innerHTML = html;

  takesList.querySelectorAll('.take-note-input').forEach(input => {
    input.addEventListener('input', e => {
      const idx = parseInt(e.target.dataset.takeIndex);
      if (state.takes[idx]) {
        state.takes[idx].note = e.target.value;
      }
    });
    input.addEventListener('keydown', e => {
      e.stopPropagation();
    });
  });
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ======= STATE TRANSITIONS =======
function startRecording() {
  state.phase = 'recording';
  state.takeNum = 1;
  state.takes = [{ start: 0, duration: 0, note: '' }];
  startTimer();
  state.meterIntervalId = setInterval(animateMeter, 100);
  renderControls();
  updateTimeline();
  showToast('ההקלטה התחילה', 'red');
}

function pauseRecording() {
  state.phase = 'paused';
  renderControls();
  updateTimeline();
  showToast('ההקלטה מושהית', 'yellow');
}

function resumeRecording(insertAtIndex) {
  if (insertAtIndex !== undefined && insertAtIndex !== null) {
    state.takeNum++;
    const newTake = { start: state.seconds, duration: 0, note: '' };
    state.takes.splice(insertAtIndex, 0, newTake);
    state.phase = 'recording';
    renderControls();
    updateTimeline();
    showToast(`טייק חדש הוכנס במיקום ${insertAtIndex + 1}`, 'cyan');
  } else {
    state.takeNum++;
    state.takes.push({ start: state.seconds, duration: 0, note: '' });
    state.phase = 'recording';
    renderControls();
    updateTimeline();
    showToast(`טייק ${state.takeNum} התחיל`, 'cyan');
  }
}

function handleCenterButton() {
  if (state.phase === 'initial') {
    startRecording();
  } else if (state.phase === 'recording') {
    pauseRecording();
  } else if (state.phase === 'paused') {
    resumeRecording();
  }
}

// ======= DELETE TAKE =======
function requestDeleteTake() {
  if (state.phase !== 'paused') return;
  if (state.takes.length < 1) return;
  const lastTake = state.takes[state.takes.length - 1];
  $('deleteDialogTitle').textContent = `למחוק את הטייק האחרון? (${formatTime(lastTake.duration)})`;
  $('deleteDialogDesc').textContent = `טייק ${state.takeNum}`;
  $('dialogDeleteTake').classList.add('visible');
}

function confirmDeleteTake() {
  closeDialog('dialogDeleteTake');
  const deletedTake = state.takes.pop();
  state.seconds -= deletedTake.duration;
  state.takeNum--;
  updateTimerDisplay();

  const segments = miniTimeline.querySelectorAll('.timeline-segment');
  const lastSeg = segments[segments.length - 1];
  if (lastSeg) {
    lastSeg.classList.add('removing');
    setTimeout(() => {
      updateTimeline();
    }, 300);
  } else {
    updateTimeline();
  }

  renderControls();
  showToast(`טייק ${state.takeNum + 1} נמחק`, 'red', true);

  if (state.takes.length === 0) {
    state.phase = 'initial';
    state.takeNum = 0;
    state.seconds = 0;
    clearInterval(state.intervalId);
    clearInterval(state.meterIntervalId);
    renderControls();
    updateTimeline();
  }
}

// ======= STOP / FINISH =======
function requestStop() {
  $('stopDialogDesc').textContent = `משך כולל: ${formatTime(state.seconds)}`;
  $('dialogStop').classList.add('visible');
  if (state.phase === 'recording') {
    state.phase = 'paused';
    renderControls();
  }
}

function confirmStop() {
  closeDialog('dialogStop');
  state.phase = 'done';
  clearInterval(state.intervalId);
  clearInterval(state.meterIntervalId);
  renderControls();
  showToast('ההקלטה נשמרה בהצלחה', 'green');
}

// ======= DIALOGS =======
function closeDialog(id) {
  $(id).classList.remove('visible');
}

document.querySelectorAll('.dialog-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) el.classList.remove('visible');
  });
});

// ======= TIMELINE =======
function updateTimeline() {
  const total = Math.max(state.seconds, 1);
  const isPaused = state.phase === 'paused';
  let html = '';

  state.takes.forEach((take, i) => {
    const isCurrent = i === state.takes.length - 1;

    if (isPaused && i > 0) {
      html += `<button class="timeline-insert-btn" data-insert-index="${i}" title="הקלט טייק חדש כאן">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="3" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        <span class="insert-tooltip">הקלט טייק חדש כאן</span>
      </button>`;
    }

    html += `<div class="timeline-segment${isCurrent ? ' current' : ''}" style="flex:${take.duration || 1}">
      <span class="segment-label">${i + 1}</span>
    </div>`;
  });

  if (isPaused && state.takes.length > 0) {
    html += `<button class="timeline-insert-btn" data-insert-index="${state.takes.length}" title="הקלט טייק חדש כאן">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--cyan)" stroke-width="3" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      <span class="insert-tooltip">הקלט טייק חדש כאן</span>
    </button>`;
  }

  if (state.takes.length > 0 && !isPaused) {
    html += `<div class="playhead" style="left:auto;right:0"></div>`;
  }
  miniTimeline.innerHTML = html;

  miniTimeline.querySelectorAll('.timeline-insert-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.insertIndex);
      resumeRecording(idx);
    });
  });
}

// ======= AUDIO METER =======
function animateMeter() {
  const bars = audioStrip.querySelectorAll('.meter-bar');
  bars.forEach((bar, i) => {
    if (state.phase !== 'recording') {
      bar.style.height = '2px';
      return;
    }
    const bases = [6, 10, 14, 12, 8, 5, 3];
    const h = Math.max(2, bases[i] + Math.random() * 8 - 2);
    bar.style.height = h + 'px';
  });
}

// ======= TOASTS =======
function showToast(msg, color, withUndo) {
  const container = $('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';

  const colors = {
    cyan: 'var(--cyan)', red: 'var(--red)', green: 'var(--green)',
    yellow: 'var(--amber)', pink: 'var(--pink)'
  };
  toast.style.borderColor = colors[color] || 'rgba(255,255,255,0.08)';

  let inner = `<span style="color:${colors[color] || '#fff'}">${msg}</span>`;
  if (withUndo) {
    inner += `<button class="toast-undo" onclick="undoDelete(this)">ביטול</button>`;
  }
  toast.innerHTML = inner;
  container.appendChild(toast);

  const timeout = withUndo ? 3500 : 2000;
  setTimeout(() => {
    toast.classList.add('leaving');
    setTimeout(() => toast.remove(), 250);
  }, timeout);
}

function undoDelete(btn) {
  state.takeNum++;
  state.takes.push({ start: state.seconds, duration: 0, note: '' });
  renderControls();
  updateTimeline();
  const toastEl = btn.closest('.toast');
  if (toastEl) {
    toastEl.classList.add('leaving');
    setTimeout(() => toastEl.remove(), 250);
  }
  showToast('הטייק שוחזר', 'cyan');
}

// ======= BUTTON EVENTS =======
bigBtn.addEventListener('click', handleCenterButton);

btnDelete.addEventListener('click', () => {
  if (state.phase === 'paused') requestDeleteTake();
});

btnFinish.addEventListener('click', () => {
  if (state.phase === 'recording' || state.phase === 'paused') requestStop();
});

// ======= KEYBOARD SHORTCUTS =======
document.addEventListener('keydown', e => {
  const dialogOpen = document.querySelector('.dialog-overlay.visible');

  if (e.key === 'Escape') {
    if (dialogOpen) {
      dialogOpen.classList.remove('visible');
    } else if (state.phase === 'recording' || state.phase === 'paused') {
      requestStop();
    }
    return;
  }

  if (dialogOpen) return;

  if (e.code === 'Space') {
    e.preventDefault();
    handleCenterButton();
  }
  if (e.key === 'Backspace' || e.key === 'Delete') {
    if (state.phase === 'paused') requestDeleteTake();
  }

  if (e.key === '1') setMode('camera');
  if (e.key === '2') setMode('screen-cam');
  if (e.key === '3') setMode('screen');
});

// ======= DRAGGABLE CAMERA OVERLAY =======
(function initDrag() {
  let isDragging = false;
  let offsetX = 0, offsetY = 0;

  cameraOverlay.addEventListener('mousedown', e => {
    isDragging = true;
    const rect = cameraOverlay.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    cameraOverlay.style.transition = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const parent = cameraOverlay.parentElement.getBoundingClientRect();
    let x = e.clientX - parent.left - offsetX;
    let y = e.clientY - parent.top - offsetY;
    const w = cameraOverlay.offsetWidth;
    const h = cameraOverlay.offsetHeight;
    x = Math.max(0, Math.min(x, parent.width - w));
    y = Math.max(0, Math.min(y, parent.height - h));
    cameraOverlay.style.left = x + 'px';
    cameraOverlay.style.top = y + 'px';
    cameraOverlay.style.bottom = 'auto';
    cameraOverlay.style.right = 'auto';
  });

  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      cameraOverlay.style.transition = '';
    }
  });

  cameraOverlay.addEventListener('touchstart', e => {
    isDragging = true;
    const touch = e.touches[0];
    const rect = cameraOverlay.getBoundingClientRect();
    offsetX = touch.clientX - rect.left;
    offsetY = touch.clientY - rect.top;
    cameraOverlay.style.transition = 'none';
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const touch = e.touches[0];
    const parent = cameraOverlay.parentElement.getBoundingClientRect();
    let x = touch.clientX - parent.left - offsetX;
    let y = touch.clientY - parent.top - offsetY;
    const w = cameraOverlay.offsetWidth;
    const h = cameraOverlay.offsetHeight;
    x = Math.max(0, Math.min(x, parent.width - w));
    y = Math.max(0, Math.min(y, parent.height - h));
    cameraOverlay.style.left = x + 'px';
    cameraOverlay.style.top = y + 'px';
    cameraOverlay.style.bottom = 'auto';
    cameraOverlay.style.right = 'auto';
  }, { passive: false });

  document.addEventListener('touchend', () => {
    isDragging = false;
    cameraOverlay.style.transition = '';
  });
})();

// ======= DEMO: Pre-fill takes =======

  state.phase = 'paused';
  state.takeNum = 3;
  state.seconds = 207;
  state.takes = [

state.meterIntervalId = setInterval(animateMeter, 100);
initDemoTakes();

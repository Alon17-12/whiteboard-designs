<!DOCTYPE html>
<html dir="rtl" lang="he" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WHITEBOARD Studio — הקלטה פעילה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #253E7A;
  --cyan: #38C4F2;
  --pink: #F05680;
  --green: #7DC57A;
  --yellow: #EAD654;
  --bg: #0a0e1a;
  --bg-secondary: #111629;
  --surface: rgba(0,0,0,0.7);
  --text: #f0f0f5;
  --text-muted: rgba(255,255,255,0.5);
  --red: #e53e3e;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Heebo', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ======= FULL SCREEN VIDEO AREA ======= */
.video-area {
  position: relative;
  width: 100%;
  height: 100dvh;
  background: radial-gradient(ellipse at 50% 40%, #141a35 0%, #0d1020 50%, #080b16 100%);
  display: flex;
  flex-direction: column;
}

.video-area::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 30% 60%, rgba(56,196,242,0.03) 0%, transparent 50%),
    radial-gradient(circle at 70% 30%, rgba(240,86,128,0.03) 0%, transparent 50%);
  pointer-events: none;
}

/* Grid pattern overlay */
.video-area::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
}

/* ======= TOP OVERLAYS ======= */
.top-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  z-index: 10;
  background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 100%);
  pointer-events: none;
}
.top-overlay > * { pointer-events: auto; }

/* Recording indicator */
.rec-indicator {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 12px;
  padding: 8px 16px;
  border: 1px solid rgba(229,62,62,0.3);
}

.rec-dot {
  width: 12px;
  height: 12px;
  background: var(--red);
  border-radius: 50%;
  animation: pulse-red 1.2s ease-in-out infinite;
}

.rec-dot.paused {
  background: var(--yellow);
  animation: pulse-yellow 1.5s ease-in-out infinite;
}

@keyframes pulse-red {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(229,62,62,0.6); }
  50% { opacity: 0.5; box-shadow: 0 0 12px 4px rgba(229,62,62,0.3); }
}

@keyframes pulse-yellow {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(234,214,84,0.5); }
  50% { opacity: 0.6; box-shadow: 0 0 12px 4px rgba(234,214,84,0.2); }
}

.rec-label {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 14px;
  color: var(--red);
  letter-spacing: 2px;
}

.rec-label.paused { color: var(--yellow); }

.rec-timer {
  font-family: 'Fredoka', monospace;
  font-weight: 500;
  font-size: 18px;
  color: var(--text);
  letter-spacing: 1px;
  min-width: 70px;
}

/* Lesson name pill */
.lesson-pill {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 8px 24px;
  border: 1px solid rgba(255,255,255,0.1);
  font-family: 'Heebo', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: rgba(255,255,255,0.8);
  white-space: nowrap;
  z-index: 10;
}

/* Brand watermark */
.watermark {
  font-family: 'Fredoka', sans-serif;
  font-weight: 700;
  font-size: 16px;
  color: rgba(255,255,255,0.15);
  letter-spacing: 2px;
}

/* ======= PAUSED OVERLAY ======= */
.paused-overlay {
  position: absolute;
  inset: 0;
  background: rgba(10,14,26,0.85);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 20;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}

.paused-overlay.visible {
  display: flex;
}

.paused-icon {
  animation: breathe 2.5s ease-in-out infinite;
}

@keyframes breathe {
  0%, 100% { transform: scale(1); opacity: 0.9; }
  50% { transform: scale(1.08); opacity: 1; }
}

.paused-text {
  font-family: 'Fredoka', sans-serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--yellow);
  margin-top: 16px;
}

.paused-hint {
  font-size: 14px;
  color: var(--text-muted);
  margin-top: 8px;
}

/* ======= BOTTOM CONTROL BAR ======= */
.control-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.08);
  padding: 12px 24px 16px;
  z-index: 15;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Row 1 — Take indicator */
.take-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

.take-badge {
  background: var(--cyan);
  color: #0a0e1a;
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 14px;
  padding: 4px 14px;
  border-radius: 20px;
}

.take-dots {
  display: flex;
  gap: 6px;
  align-items: center;
}

.take-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  transition: background 0.3s;
}
.take-dot.current { background: var(--cyan); }

/* Row 2 — Main controls */
.main-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
}

.ctrl-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text);
  font-family: 'Heebo', sans-serif;
  font-size: 11px;
  font-weight: 500;
  outline: none;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.15s, opacity 0.15s;
}

.ctrl-btn:hover { transform: scale(1.05); }
.ctrl-btn:active { transform: scale(0.95); }

.ctrl-icon {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, box-shadow 0.2s;
}

.ctrl-icon.delete {
  background: rgba(229,62,62,0.15);
  border: 2px solid rgba(229,62,62,0.4);
}
.ctrl-btn:hover .ctrl-icon.delete {
  background: rgba(229,62,62,0.25);
}

.ctrl-icon.pause-resume {
  width: 64px;
  height: 64px;
  background: var(--cyan);
  box-shadow: 0 0 24px rgba(56,196,242,0.3);
}
.ctrl-icon.pause-resume.is-paused {
  background: var(--yellow);
  box-shadow: 0 0 24px rgba(234,214,84,0.3);
  animation: pulse-btn 1.5s ease-in-out infinite;
}

@keyframes pulse-btn {
  0%, 100% { box-shadow: 0 0 24px rgba(234,214,84,0.3); }
  50% { box-shadow: 0 0 36px rgba(234,214,84,0.5); }
}

.ctrl-icon.new-take {
  background: rgba(56,196,242,0.15);
  border: 2px solid rgba(56,196,242,0.4);
}
.ctrl-btn:hover .ctrl-icon.new-take {
  background: rgba(56,196,242,0.25);
}

.ctrl-icon.stop {
  background: rgba(229,62,62,0.2);
  border: 2px solid var(--red);
}
.ctrl-btn:hover .ctrl-icon.stop {
  background: rgba(229,62,62,0.35);
}

/* Row 3 — Secondary controls */
.secondary-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
}

.sec-btn {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text);
  transition: background 0.2s;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}
.sec-btn:hover { background: rgba(255,255,255,0.12); }
.sec-btn.off { color: var(--red); border-color: rgba(229,62,62,0.3); }
.sec-btn.off svg { opacity: 0.6; }

/* Audio level meter */
.audio-meter {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 28px;
  padding: 0 8px;
}

.meter-bar {
  width: 4px;
  border-radius: 2px;
  background: var(--green);
  transition: height 0.1s ease;
}
.meter-bar:nth-child(4) { background: var(--yellow); }
.meter-bar:nth-child(5) { background: var(--red); }

.sec-info {
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'Fredoka', sans-serif;
  letter-spacing: 0.5px;
}

/* ======= MINI TIMELINE ======= */
.mini-timeline {
  width: 100%;
  height: 20px;
  position: relative;
  display: flex;
  border-radius: 4px;
  overflow: hidden;
  background: rgba(255,255,255,0.05);
}

.timeline-segment {
  height: 100%;
  position: relative;
  display: flex;
  align-items: center;
  min-width: 30px;
  transition: flex 0.3s;
}

.timeline-segment:nth-child(odd) { background: rgba(56,196,242,0.2); }
.timeline-segment:nth-child(even) { background: rgba(37,62,122,0.4); }
.timeline-segment.current { background: rgba(56,196,242,0.35); }

.segment-label {
  font-size: 9px;
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  color: rgba(255,255,255,0.5);
  padding-right: 6px;
}

.playhead {
  position: absolute;
  top: 0;
  width: 2px;
  height: 100%;
  background: #fff;
  box-shadow: 0 0 6px rgba(255,255,255,0.5);
  transition: right 0.3s linear;
  z-index: 2;
}

/* ======= CONFIRMATION DIALOG ======= */
.dialog-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.dialog-overlay.visible { display: flex; }

.dialog {
  background: #1a1f36;
  border-radius: 20px;
  padding: 28px 32px;
  max-width: 360px;
  width: 90%;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

.dialog-icon { margin-bottom: 12px; }

.dialog h3 {
  font-family: 'Fredoka', sans-serif;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 8px;
}

.dialog p {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 20px;
}

.dialog-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
}

.dialog-btn {
  padding: 10px 24px;
  border-radius: 12px;
  border: none;
  font-family: 'Heebo', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  min-width: 44px;
  min-height: 44px;
  transition: transform 0.15s, opacity 0.15s;
}
.dialog-btn:hover { transform: scale(1.03); }
.dialog-btn:active { transform: scale(0.97); }

.dialog-btn.cancel {
  background: rgba(255,255,255,0.08);
  color: var(--text);
  border: 1px solid rgba(255,255,255,0.15);
}

.dialog-btn.confirm-red {
  background: var(--red);
  color: #fff;
}

.dialog-btn.confirm-green {
  background: var(--green);
  color: #0a0e1a;
}

.dialog-btn.confirm-cyan {
  background: var(--cyan);
  color: #0a0e1a;
}

/* ======= TOAST ======= */
.toast-container {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}

.toast {
  background: #1e2440;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  padding: 12px 20px;
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  animation: toast-in 0.3s ease;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.toast.leaving {
  animation: toast-out 0.3s ease forwards;
}

.toast-undo {
  background: none;
  border: none;
  color: var(--cyan);
  font-family: 'Heebo', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
}
.toast-undo:hover { background: rgba(56,196,242,0.1); }

@keyframes toast-in {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes toast-out {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-10px); }
}

/* ======= KEYBOARD HINTS ======= */
kbd {
  display: inline-block;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  padding: 1px 6px;
  font-family: 'Fredoka', monospace;
  font-size: 11px;
  color: var(--text-muted);
}
</style>
</head>
<body>

<div class="video-area" id="videoArea">
  <!-- Top overlay -->
  <div class="top-overlay">
    <!-- Recording indicator (top-right in RTL = visually right) -->
    <div class="rec-indicator" id="recIndicator">
      <div class="rec-dot" id="recDot"></div>
      <span class="rec-label" id="recLabel">REC</span>
      <span class="rec-timer" id="recTimer">00:00</span>
    </div>

    <!-- Brand watermark -->
    <span class="watermark">WHITEBOARD</span>
  </div>

  <!-- Lesson name pill -->
  <div class="lesson-pill">שיעור 3: צבע ומשמעות</div>

  <!-- Paused overlay -->
  <div class="paused-overlay" id="pausedOverlay">
    <div class="paused-icon">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
        <rect x="18" y="14" width="12" height="44" rx="4" fill="#EAD654"/>
        <rect x="42" y="14" width="12" height="44" rx="4" fill="#EAD654"/>
      </svg>
    </div>
    <div class="paused-text">ההקלטה מושהית</div>
    <div class="paused-hint">לחץ <kbd>רווח</kbd> או כפתור המשך</div>
  </div>

  <!-- Bottom control bar -->
  <div class="control-bar">
    <!-- Mini timeline -->
    <div class="mini-timeline" id="miniTimeline">
      <!-- Segments injected by JS -->
    </div>

    <!-- Row 1: Take indicator -->
    <div class="take-row">
      <span class="take-badge" id="takeBadge">טייק 1</span>
      <div class="take-dots" id="takeDots">
        <div class="take-dot current"></div>
      </div>
    </div>

    <!-- Row 2: Main controls -->
    <div class="main-controls">
      <button class="ctrl-btn" id="btnDeleteTake" title="מחק טייק אחרון (Backspace)">
        <div class="ctrl-icon delete">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            <line x1="10" y1="11" x2="10" y2="17"/>
            <line x1="14" y1="11" x2="14" y2="17"/>
          </svg>
        </div>
        <span>מחק טייק</span>
      </button>

      <button class="ctrl-btn" id="btnPauseResume" title="השהה / המשך (Space)">
        <div class="ctrl-icon pause-resume" id="pauseResumeIcon">
          <!-- Pause icon -->
          <svg id="iconPause" width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect x="7" y="5" width="4.5" height="18" rx="1.5" fill="#0a0e1a"/>
            <rect x="16.5" y="5" width="4.5" height="18" rx="1.5" fill="#0a0e1a"/>
          </svg>
          <!-- Play/Resume icon (hidden) -->
          <svg id="iconResume" width="28" height="28" viewBox="0 0 28 28" fill="none" style="display:none">
            <path d="M9 5.5L22 14L9 22.5V5.5Z" fill="#0a0e1a"/>
          </svg>
        </div>
        <span id="pauseResumeLabel">השהה</span>
      </button>

      <button class="ctrl-btn" id="btnNewTake" title="טייק חדש (T)">
        <div class="ctrl-icon new-take">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="6" cy="6" r="3"/>
            <circle cx="6" cy="18" r="3"/>
            <line x1="20" y1="4" x2="8.12" y2="15.88"/>
            <line x1="14.47" y1="14.48" x2="20" y2="20"/>
            <line x1="8.12" y1="8.12" x2="12" y2="12"/>
          </svg>
        </div>
        <span>טייק חדש</span>
      </button>

      <button class="ctrl-btn" id="btnStop" title="סיים הקלטה (Esc)">
        <div class="ctrl-icon stop">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="3" y="3" width="14" height="14" rx="2" fill="currentColor"/>
          </svg>
        </div>
        <span>סיים הקלטה</span>
      </button>
    </div>

    <!-- Row 3: Secondary controls -->
    <div class="secondary-controls">
      <button class="sec-btn" id="btnCamera" title="מצלמה">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 7l-7 5 7 5V7z"/>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
      </button>

      <button class="sec-btn" id="btnMic" title="מיקרופון">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>

      <div class="audio-meter" id="audioMeter">
        <div class="meter-bar" style="height:8px"></div>
        <div class="meter-bar" style="height:12px"></div>
        <div class="meter-bar" style="height:18px"></div>
        <div class="meter-bar" style="height:10px"></div>
        <div class="meter-bar" style="height:4px"></div>
      </div>

      <span class="sec-info" id="elapsedInfo">00:00</span>
      <span class="sec-info" id="fileSizeInfo">~0 MB</span>
    </div>
  </div>
</div>

<!-- Delete Take Dialog -->
<div class="dialog-overlay" id="dialogDeleteTake">
  <div class="dialog">
    <div class="dialog-icon">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="22" fill="rgba(229,62,62,0.15)" stroke="#e53e3e" stroke-width="2"/>
        <path d="M16 18h16M20 18v-2a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M30 18v14a2 2 0 0 1-2 2H20a2 2 0 0 1-2-2V18" stroke="#e53e3e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h3 id="deleteDialogTitle">האם למחוק את טייק 1?</h3>
    <p id="deleteDialogDesc">(0:00)</p>
    <div class="dialog-actions">
      <button class="dialog-btn cancel" onclick="closeDialog('dialogDeleteTake')">ביטול</button>
      <button class="dialog-btn confirm-red" onclick="confirmDeleteTake()">מחק</button>
    </div>
  </div>
</div>

<!-- Stop Recording Dialog -->
<div class="dialog-overlay" id="dialogStop">
  <div class="dialog">
    <div class="dialog-icon">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="22" fill="rgba(56,196,242,0.1)" stroke="#38C4F2" stroke-width="2"/>
        <rect x="16" y="16" width="16" height="16" rx="3" fill="#38C4F2"/>
      </svg>
    </div>
    <h3>לסיים את ההקלטה?</h3>
    <p id="stopDialogDesc">משך כולל: 00:00</p>
    <div class="dialog-actions">
      <button class="dialog-btn cancel" onclick="closeDialog('dialogStop')">המשך הקלטה</button>
      <button class="dialog-btn confirm-green" onclick="confirmStop()">סיים ושמור</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ======= STATE =======
const state = {
  recording: true,
  paused: false,
  seconds: 0,
  takeNum: 1,
  takes: [{ start: 0, duration: 0 }],
  cameraOn: true,
  micOn: true,
  intervalId: null,
  meterIntervalId: null,
  pendingUndo: null
};

// ======= ELEMENTS =======
const $ = id => document.getElementById(id);
const recDot = $('recDot');
const recLabel = $('recLabel');
const recTimer = $('recTimer');
const recIndicator = $('recIndicator');
const pausedOverlay = $('pausedOverlay');
const pauseResumeIcon = $('pauseResumeIcon');
const iconPause = $('iconPause');
const iconResume = $('iconResume');
const pauseResumeLabel = $('pauseResumeLabel');
const takeBadge = $('takeBadge');
const takeDots = $('takeDots');
const miniTimeline = $('miniTimeline');
const elapsedInfo = $('elapsedInfo');
const fileSizeInfo = $('fileSizeInfo');
const audioMeter = $('audioMeter');

// ======= TIMER =======
function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
}

function tick() {
  if (!state.paused && state.recording) {
    state.seconds++;
    state.takes[state.takes.length - 1].duration++;
    updateUI();
  }
}

function startTimer() {
  if (state.intervalId) clearInterval(state.intervalId);
  state.intervalId = setInterval(tick, 1000);
}

function updateUI() {
  recTimer.textContent = formatTime(state.seconds);
  elapsedInfo.textContent = formatTime(state.seconds);
  const mb = Math.round(state.seconds * 0.85);
  fileSizeInfo.textContent = `~${mb} MB`;
  updateTimeline();
}

// ======= PAUSE / RESUME =======
function togglePause() {
  state.paused = !state.paused;
  if (state.paused) {
    pausedOverlay.classList.add('visible');
    iconPause.style.display = 'none';
    iconResume.style.display = 'block';
    pauseResumeIcon.classList.add('is-paused');
    pauseResumeLabel.textContent = 'המשך';
    recDot.classList.add('paused');
    recLabel.classList.add('paused');
    recLabel.textContent = 'PAUSED';
    showToast('ההקלטה מושהית', 'yellow');
  } else {
    pausedOverlay.classList.remove('visible');
    iconPause.style.display = 'block';
    iconResume.style.display = 'none';
    pauseResumeIcon.classList.remove('is-paused');
    pauseResumeLabel.textContent = 'השהה';
    recDot.classList.remove('paused');
    recLabel.classList.remove('paused');
    recLabel.textContent = 'REC';
    showToast('ההקלטה ממשיכה', 'green');
  }
}

// ======= TAKES =======
function newTake() {
  if (state.paused) return;
  state.takeNum++;
  state.takes.push({ start: state.seconds, duration: 0 });
  updateTakeUI();
  updateTimeline();
  showToast(`טייק חדש: #${state.takeNum}`, 'cyan');
}

function updateTakeUI() {
  takeBadge.textContent = `טייק ${state.takeNum}`;
  takeDots.innerHTML = '';
  for (let i = 0; i < state.takeNum; i++) {
    const dot = document.createElement('div');
    dot.className = 'take-dot' + (i === state.takeNum - 1 ? ' current' : '');
    takeDots.appendChild(dot);
  }
}

function requestDeleteTake() {
  if (state.takeNum <= 1) return;
  const lastTake = state.takes[state.takes.length - 1];
  $('deleteDialogTitle').textContent = `האם למחוק את טייק ${state.takeNum}?`;
  $('deleteDialogDesc').textContent = `(${formatTime(lastTake.duration)})`;
  $('dialogDeleteTake').classList.add('visible');
}

function confirmDeleteTake() {
  closeDialog('dialogDeleteTake');
  const deletedNum = state.takeNum;
  const deletedTake = state.takes.pop();
  state.seconds -= deletedTake.duration;
  state.takeNum--;
  updateTakeUI();
  updateUI();
  showToast(`טייק ${deletedNum} נמחק`, 'red', true);
}

// ======= STOP =======
function requestStop() {
  $('stopDialogDesc').textContent = `משך כולל: ${formatTime(state.seconds)}`;
  $('dialogStop').classList.add('visible');
  if (!state.paused) togglePause();
}

function confirmStop() {
  closeDialog('dialogStop');
  state.recording = false;
  clearInterval(state.intervalId);
  clearInterval(state.meterIntervalId);
  recLabel.textContent = 'DONE';
  recDot.style.animation = 'none';
  recDot.style.background = 'var(--green)';
  showToast('ההקלטה נשמרה בהצלחה', 'green');
}

// ======= DIALOGS =======
function closeDialog(id) {
  $(id).classList.remove('visible');
}

// close dialog on overlay click
document.querySelectorAll('.dialog-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target === el) el.classList.remove('visible');
  });
});

// ======= TIMELINE =======
function updateTimeline() {
  const total = Math.max(state.seconds, 1);
  let html = '';
  state.takes.forEach((take, i) => {
    const pct = Math.max((take.duration / total) * 100, 2);
    const isCurrent = i === state.takes.length - 1;
    html += `<div class="timeline-segment${isCurrent ? ' current' : ''}" style="flex:${take.duration || 1}">
      <span class="segment-label">${i + 1}</span>
    </div>`;
  });
  // playhead at the end of current segment
  miniTimeline.innerHTML = html + `<div class="playhead" style="left:auto;right:0"></div>`;
}

// ======= AUDIO METER =======
function animateMeter() {
  const bars = audioMeter.querySelectorAll('.meter-bar');
  bars.forEach((bar, i) => {
    if (state.paused || !state.recording || !state.micOn) {
      bar.style.height = '3px';
      return;
    }
    const base = [14, 18, 22, 12, 6][i];
    const h = Math.max(3, base + Math.random() * 12 - 4);
    bar.style.height = h + 'px';
  });
}

// ======= CAMERA / MIC =======
$('btnCamera').addEventListener('click', () => {
  state.cameraOn = !state.cameraOn;
  $('btnCamera').classList.toggle('off', !state.cameraOn);
});

$('btnMic').addEventListener('click', () => {
  state.micOn = !state.micOn;
  $('btnMic').classList.toggle('off', !state.micOn);
});

// ======= TOASTS =======
function showToast(msg, color, withUndo) {
  const container = $('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';

  const colors = {
    cyan: 'var(--cyan)', red: 'var(--red)', green: 'var(--green)',
    yellow: 'var(--yellow)', pink: 'var(--pink)'
  };
  toast.style.borderColor = colors[color] || 'rgba(255,255,255,0.12)';

  let inner = `<span style="color:${colors[color] || '#fff'}">${msg}</span>`;
  if (withUndo) {
    inner += `<button class="toast-undo" onclick="undoDelete(this)">ביטול</button>`;
  }
  toast.innerHTML = inner;
  container.appendChild(toast);

  const timeout = withUndo ? 3000 : 2000;
  setTimeout(() => {
    toast.classList.add('leaving');
    setTimeout(() => toast.remove(), 300);
  }, timeout);
}

function undoDelete(btn) {
  // Simple undo: re-add a take with 0 duration
  state.takeNum++;
  state.takes.push({ start: state.seconds, duration: 0 });
  updateTakeUI();
  updateTimeline();
  const toastEl = btn.closest('.toast');
  if (toastEl) {
    toastEl.classList.add('leaving');
    setTimeout(() => toastEl.remove(), 300);
  }
  showToast('הטייק שוחזר', 'cyan');
}

// ======= BUTTON EVENTS =======
$('btnPauseResume').addEventListener('click', () => {
  if (!state.recording) return;
  togglePause();
});

$('btnNewTake').addEventListener('click', () => {
  if (!state.recording || state.paused) return;
  newTake();
});

$('btnDeleteTake').addEventListener('click', () => {
  if (!state.recording) return;
  requestDeleteTake();
});

$('btnStop').addEventListener('click', () => {
  if (!state.recording) return;
  requestStop();
});

// ======= KEYBOARD SHORTCUTS =======
document.addEventListener('keydown', e => {
  // Don't trigger if a dialog is open (unless Escape)
  const dialogOpen = document.querySelector('.dialog-overlay.visible');

  if (e.key === 'Escape') {
    if (dialogOpen) {
      dialogOpen.classList.remove('visible');
      // If we paused for stop dialog, resume
      if (state.paused && state.recording) togglePause();
    } else if (state.recording) {
      requestStop();
    }
    return;
  }

  if (dialogOpen) return;

  if (e.code === 'Space') {
    e.preventDefault();
    if (state.recording) togglePause();
  }
  if (e.key === 't' || e.key === 'T' || e.key === 'ט') {
    if (state.recording && !state.paused) newTake();
  }
  if (e.key === 'Backspace') {
    if (state.recording) requestDeleteTake();
  }
});

// ======= INIT =======
startTimer();
state.meterIntervalId = setInterval(animateMeter, 100);
updateTakeUI();
updateTimeline();
updateUI();
</script>
</body>
</html>

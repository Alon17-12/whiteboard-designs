<!DOCTYPE html>
<html lang="he" dir="rtl" data-theme="light" data-mode="teacher">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מבחן — צבע וטיפוגרפיה | יסודות העיצוב | WHITEBOARD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --navy:#253E7A; --navy-dark:#1a2e5e; --cyan:#38C4F2; --cyan-light:rgba(56,196,242,0.13);
  --pink:#F05680; --green:#7DC57A; --green-bright:#22c55e; --amber:#F59E0B; --yellow:#EAD654;
  --font:'Heebo',sans-serif; --font-brand:'Fredoka',sans-serif;
  --r-xs:6px; --r-sm:10px; --r-md:16px; --r-lg:18px;
  --strip-w:52px;
  --bg:#EBF3FB;
  --surface:#FFFFFF; --surface-2:#F4F9FF; --surface-3:#edf4ff;
  --border:rgba(37,62,122,0.1); --border-mid:rgba(37,62,122,0.16);
  --text-main:#1a2f5e; --text-sub:rgba(37,62,122,0.52); --text-xs:rgba(37,62,122,0.35);
  --sh-sm:0 2px 8px rgba(37,62,122,0.08); --sh-md:0 4px 20px rgba(37,62,122,0.12);
  --eb-bg:#fffbeb; --eb-border:#fde68a;
  --edit-tint:rgba(245,158,11,0.05);
  --correct-bg:rgba(125,197,122,0.08); --correct-border:rgba(125,197,122,0.5);
}
[data-theme="dark"] {
  --navy-dark:#111e3a;
  --bg:#0c1422; --surface:#131e35; --surface-2:#192740; --surface-3:#1e2e48;
  --border:rgba(255,255,255,0.07); --border-mid:rgba(255,255,255,0.12);
  --text-main:#dde5f5; --text-sub:rgba(221,229,245,0.48); --text-xs:rgba(221,229,245,0.28);
  --sh-sm:0 2px 12px rgba(0,0,0,0.3); --sh-md:0 6px 24px rgba(0,0,0,0.4);
  --eb-bg:#1a1100; --eb-border:rgba(245,158,11,0.28);
  --edit-tint:rgba(245,158,11,0.04);
  --correct-bg:rgba(125,197,122,0.06); --correct-border:rgba(125,197,122,0.35);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font);background:var(--bg);color:var(--text-main);
  height:100dvh;display:flex;flex-direction:column;overflow:hidden;
  transition:background .25s,color .25s;}

/* ══════════════════════════════════
   TOPBAR
══════════════════════════════════ */
.topbar{
  height:48px;background:var(--surface);border-bottom:1px solid var(--border-mid);
  display:flex;align-items:center;justify-content:space-between;padding:0 18px;
  flex-shrink:0;box-shadow:var(--sh-sm);z-index:30;transition:background .25s,border-color .25s;
}
.bc{display:flex;align-items:center;gap:5px;font-size:12.5px;flex-wrap:wrap;}
.bc a{color:var(--text-sub);text-decoration:none;transition:color .15s;}
.bc a:hover{color:var(--text-main);}
.bc-sep{color:var(--text-xs);}
.bc-cur{color:var(--text-main);font-weight:700;}
.bc-edit-tag{
  display:inline-flex;align-items:center;gap:3px;padding:2px 8px;
  border-radius:20px;background:var(--amber);color:#fff;font-size:10px;font-weight:800;
}
.tb-right{display:flex;align-items:center;gap:7px;}
.ib{width:32px;height:32px;border-radius:var(--r-xs);border:1px solid var(--border);
  background:var(--surface);display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-sub);transition:all .18s;}
.ib:hover{background:var(--cyan-light);color:var(--navy);border-color:var(--cyan);}
.ib svg{width:14px;height:14px;}
.icon-sun{display:none;}.icon-moon{display:block;}
[data-theme="dark"] .icon-sun{display:block;}[data-theme="dark"] .icon-moon{display:none;}

/* ══════════════════════════════════
   EDIT BANNER
══════════════════════════════════ */
.edit-banner{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 18px;background:var(--surface);
  border-bottom:2px solid var(--amber);
  flex-shrink:0;gap:12px;
  animation:slideDown .2s ease;
}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.eb-l{display:flex;align-items:center;gap:10px;}
.eb-badge{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:800;color:var(--amber);}
.eb-badge svg{width:11px;height:11px;}
.eb-dot-wrap{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-xs);}
.green-dot{width:5px;height:5px;border-radius:50%;background:var(--green-bright);flex-shrink:0;}
.ls-status{
  display:flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;
  border:1.5px solid;
}
.ls-status.published{background:rgba(34,197,94,0.1);color:#16a34a;border-color:rgba(34,197,94,0.3);}
.ls-status.draft{background:rgba(234,214,84,0.13);color:#92700a;border-color:rgba(234,214,84,0.4);}
[data-theme="dark"] .ls-status.draft{color:#e6c94a;}
.ls-status svg{width:10px;height:10px;}
.eb-r{display:flex;align-items:center;gap:6px;}
.eb-pub{display:flex;align-items:center;gap:5px;padding:5px 14px;border-radius:20px;
  border:none;font-family:var(--font);font-size:11.5px;font-weight:700;
  background:var(--navy);color:#fff;cursor:pointer;transition:all .2s;}
.eb-pub:hover{background:var(--cyan);}

/* ══════════════════════════════════
   BODY LAYOUT
══════════════════════════════════ */
.exam-body{flex:1;display:flex;overflow:hidden;}

/* ══════════════════════════════════
   RIGHT NAVY STRIP
══════════════════════════════════ */
.right-strip{
  width:var(--strip-w);flex-shrink:0;
  background:#1a2e5e;
  display:flex;flex-direction:column;align-items:center;
  z-index:20;border-right:3px solid var(--amber);
}
.rs-logo{
  width:100%;display:flex;align-items:center;justify-content:center;
  padding:10px 0 8px;border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0;
}
.rs-logo svg{width:28px;height:28px;}
.rs-icons{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;}
.rs-btn{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .18s;position:relative;flex-shrink:0;
  background:transparent;border:none;color:rgba(255,255,255,0.5);padding:0;
}
.rs-btn:hover{background:rgba(255,255,255,0.1);color:#fff;}
.rs-btn svg{width:17px;height:17px;}
.rs-btn::after{
  content:attr(data-tip);
  position:absolute;right:calc(100% + 8px);top:50%;transform:translateY(-50%);
  background:rgba(0,0,0,.8);color:#fff;font-family:var(--font);font-size:11px;font-weight:700;
  padding:3px 8px;border-radius:6px;white-space:nowrap;
  opacity:0;pointer-events:none;transition:opacity .15s;z-index:100;
}
.rs-btn:hover::after{opacity:1;}
.rs-bottom{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:8px 0;border-top:1px solid rgba(255,255,255,0.1);flex-shrink:0;
}
.rs-profile{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,#38C4F2,#253E7A);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:900;color:#fff;cursor:pointer;
  border:2px solid rgba(255,255,255,0.2);transition:border-color .18s;flex-shrink:0;
}
.rs-profile:hover{border-color:rgba(255,255,255,0.5);}

/* ══════════════════════════════════
   MAIN SCROLLABLE AREA
══════════════════════════════════ */
.main-scroll{
  flex:1;overflow-y:auto;padding:24px 32px 100px;
  background:var(--bg);transition:background .25s;
}
.main-inner{max-width:780px;margin:0 auto;display:flex;flex-direction:column;gap:20px;}

/* ══════════════════════════════════
   EXAM HEADER CARD
══════════════════════════════════ */
.exam-header{
  background:var(--surface);border-radius:var(--r-md);padding:22px 24px;
  box-shadow:var(--sh-sm);border:1px solid var(--border);
  display:flex;flex-direction:column;gap:12px;transition:background .25s,border-color .25s;
}
.eh-top{display:flex;align-items:center;gap:14px;}
.eh-icon{
  width:48px;height:48px;border-radius:var(--r-sm);
  background:rgba(240,86,128,0.1);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.eh-icon svg{width:24px;height:24px;color:var(--pink);}
.eh-title{
  flex:1;border:none;background:transparent;font-family:'Fredoka',sans-serif;
  font-size:22px;font-weight:600;color:var(--text-main);outline:none;
  border-bottom:2px dashed transparent;transition:border-color .2s;
}
.eh-title:focus{border-bottom-color:var(--cyan);}
.eh-stats{display:flex;align-items:center;gap:16px;font-size:13px;color:var(--text-sub);padding-right:62px;}
.eh-stats span{display:flex;align-items:center;gap:5px;}

/* ══════════════════════════════════
   EXAM SETTINGS BAR
══════════════════════════════════ */
.settings-bar{
  background:var(--surface);border-radius:var(--r-md);padding:14px 20px;
  box-shadow:var(--sh-sm);border:1px solid var(--border);
  display:flex;align-items:center;flex-wrap:wrap;gap:18px;
  transition:background .25s,border-color .25s;
}
.sb-item{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;white-space:nowrap;}
.sb-label{color:var(--text-sub);font-weight:700;}
.sb-sep{width:1px;height:24px;background:var(--border);flex-shrink:0;}

/* Slider */
.sb-slider-wrap{display:flex;align-items:center;gap:8px;}
.sb-slider{
  -webkit-appearance:none;appearance:none;width:100px;height:6px;
  background:var(--surface-3);border-radius:3px;outline:none;cursor:pointer;
}
.sb-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;border-radius:50%;
  background:var(--navy);cursor:pointer;border:2px solid var(--surface);
  box-shadow:0 2px 6px rgba(0,0,0,.15);
}
[data-theme="dark"] .sb-slider::-webkit-slider-thumb{background:var(--cyan);}
.sb-slider-val{
  min-width:36px;text-align:center;font-weight:800;font-size:13px;
  color:var(--navy);font-family:'Fredoka',sans-serif;
}
[data-theme="dark"] .sb-slider-val{color:var(--cyan);}

/* Toggle */
.toggle{
  position:relative;width:36px;height:20px;border-radius:10px;
  background:var(--surface-3);border:1.5px solid var(--border);
  cursor:pointer;transition:all .2s;flex-shrink:0;
}
.toggle.on{background:var(--green);border-color:var(--green);}
.toggle::after{
  content:'';position:absolute;top:2px;right:2px;width:14px;height:14px;
  border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15);
  transition:transform .2s;
}
.toggle.on::after{transform:translateX(-16px);}

/* Select */
.sb-select{
  padding:4px 10px;border-radius:var(--r-xs);border:1.5px solid var(--border);
  background:var(--surface);font-family:var(--font);font-size:12px;font-weight:600;
  color:var(--text-main);cursor:pointer;transition:border-color .15s;outline:none;
}
.sb-select:focus{border-color:var(--cyan);}

/* Minutes input */
.sb-minutes{
  width:50px;padding:4px 8px;border-radius:var(--r-xs);border:1.5px solid var(--border);
  background:var(--surface);font-family:var(--font);font-size:12px;font-weight:600;
  color:var(--text-main);text-align:center;outline:none;transition:border-color .15s;
}
.sb-minutes:focus{border-color:var(--cyan);}
.sb-minutes:disabled{opacity:.35;cursor:not-allowed;}

/* ══════════════════════════════════
   QUESTION CARD
══════════════════════════════════ */
.q-card{
  background:var(--surface);border-radius:var(--r-md);
  box-shadow:var(--sh-sm);border:1px solid var(--border);
  overflow:hidden;transition:all .3s;position:relative;
}
.q-card.fade-out{opacity:0;transform:translateY(-10px);max-height:0;margin:0;padding:0;overflow:hidden;}

.q-top{
  display:flex;align-items:flex-start;gap:14px;padding:18px 20px 0;
}
.q-drag{
  width:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:grab;color:var(--text-xs);padding-top:4px;flex-shrink:0;
  transition:color .15s;
}
.q-drag:hover{color:var(--text-sub);}
.q-drag:active{cursor:grabbing;}
.q-drag span{display:flex;gap:3px;}
.q-drag span i{width:4px;height:4px;border-radius:50%;background:currentColor;}

.q-num{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka',sans-serif;font-size:14px;font-weight:700;color:#fff;
  flex-shrink:0;
}
.q-num-1{background:var(--pink);}
.q-num-2{background:var(--navy);}
.q-num-3{background:var(--cyan);}
.q-num-4{background:var(--amber);}
.q-num-5{background:var(--green);}
.q-num-6{background:#8b5cf6;}
.q-num-7{background:#ec4899;}
.q-num-8{background:#14b8a6;}

.q-text{
  flex:1;border:none;background:transparent;font-family:var(--font);
  font-size:15px;font-weight:600;color:var(--text-main);outline:none;
  line-height:1.5;resize:none;min-height:24px;
  border-bottom:2px dashed transparent;padding-bottom:2px;transition:border-color .2s;
}
.q-text:focus{border-bottom-color:var(--cyan);}

.q-del{
  position:absolute;top:12px;left:12px;width:30px;height:30px;border-radius:var(--r-xs);
  border:1.5px solid var(--border);background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-xs);transition:all .15s;
}
.q-del:hover{background:rgba(240,86,128,.1);border-color:rgba(240,86,128,.4);color:var(--pink);}
.q-del svg{width:14px;height:14px;}

/* Options */
.q-options{padding:14px 20px 16px;display:flex;flex-direction:column;gap:8px;margin-right:70px;}

.q-opt{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  border-radius:var(--r-sm);border:1.5px solid var(--border);
  background:var(--surface-2);transition:all .25s;position:relative;
}
.q-opt.correct{
  background:var(--correct-bg);border-color:var(--correct-border);
  border-right:4px solid var(--green);
}

.q-radio{
  width:22px;height:22px;border-radius:50%;border:2px solid var(--border-mid);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .2s;flex-shrink:0;background:var(--surface);
}
.q-radio:hover{border-color:var(--green);}
.q-opt.correct .q-radio{border-color:var(--green);background:var(--green);}
.q-opt.correct .q-radio svg{display:block;}
.q-radio svg{width:12px;height:12px;color:#fff;display:none;}

.q-opt-text{
  flex:1;border:none;background:transparent;font-family:var(--font);
  font-size:13.5px;color:var(--text-main);outline:none;font-weight:500;
}
.q-opt.correct .q-opt-text{color:var(--text-main);font-weight:700;}

.q-opt-del{
  width:24px;height:24px;border-radius:var(--r-xs);border:none;
  background:transparent;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-xs);transition:all .15s;flex-shrink:0;
}
.q-opt-del:hover{color:var(--pink);background:rgba(240,86,128,.08);}
.q-opt-del svg{width:12px;height:12px;}

.q-add-opt{
  display:flex;align-items:center;gap:5px;padding:6px 0;margin-right:70px;
  font-size:12.5px;font-weight:600;color:var(--cyan);cursor:pointer;
  background:none;border:none;font-family:var(--font);transition:color .15s;
}
.q-add-opt:hover{color:var(--navy);}
[data-theme="dark"] .q-add-opt:hover{color:#fff;}
.q-add-opt svg{width:14px;height:14px;}

/* ══════════════════════════════════
   ADD QUESTION BUTTON
══════════════════════════════════ */
.add-q-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:18px;border-radius:var(--r-md);
  border:2px dashed var(--border-mid);background:transparent;
  font-family:var(--font);font-size:14px;font-weight:700;
  color:var(--text-sub);cursor:pointer;transition:all .2s;width:100%;
}
.add-q-btn:hover{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-light);}
.add-q-btn svg{width:18px;height:18px;}

/* ══════════════════════════════════
   PREVIEW FAB
══════════════════════════════════ */
.preview-fab{
  position:fixed;bottom:24px;left:24px;
  display:flex;align-items:center;gap:8px;
  padding:12px 22px;border-radius:30px;border:none;
  background:linear-gradient(135deg,var(--navy),#1a2e5e);color:#fff;
  font-family:var(--font);font-size:13px;font-weight:700;
  cursor:pointer;box-shadow:0 6px 24px rgba(37,62,122,.3);
  transition:all .25s;z-index:50;
}
.preview-fab:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(37,62,122,.4);}
.preview-fab svg{width:16px;height:16px;}

/* ══════════════════════════════════
   TOAST
══════════════════════════════════ */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  padding:10px 22px;border-radius:var(--r-sm);
  background:var(--surface);color:var(--text-main);
  font-size:13px;font-weight:600;box-shadow:var(--sh-md);
  border:1px solid var(--border);
  opacity:0;pointer-events:none;transition:all .3s;z-index:100;
  display:flex;align-items:center;gap:8px;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto;}
.toast svg{width:16px;height:16px;flex-shrink:0;}
.toast-success svg{color:var(--green-bright);}
.toast-info svg{color:var(--cyan);}

/* ══════════════════════════════════
   SCROLLBAR
══════════════════════════════════ */
.main-scroll::-webkit-scrollbar{width:6px;}
.main-scroll::-webkit-scrollbar-track{background:transparent;}
.main-scroll::-webkit-scrollbar-thumb{background:rgba(37,62,122,.12);border-radius:3px;}
[data-theme="dark"] .main-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);}

/* ══════════════════════════════════
   ANIMATIONS
══════════════════════════════════ */
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.q-card{animation:fadeInUp .3s ease;}
.q-card.new-card{animation:fadeInUp .35s ease;}

/* ══════════════════════════════════
   RESPONSIVE
══════════════════════════════════ */
@media(max-width:700px){
  .main-scroll{padding:16px 12px 100px;}
  .settings-bar{flex-direction:column;align-items:flex-start;gap:12px;}
  .sb-sep{display:none;}
  .q-options{margin-right:50px;}
  .eh-stats{padding-right:50px;}
}
</style>
</head>
<body>

<!-- ════ TOPBAR ════ -->
<header class="topbar">
  <nav class="bc">
    <a href="#">מרכזי הידע</a>
    <span class="bc-sep">&#x203A;</span>
    <a href="#">יסודות העיצוב</a>
    <span class="bc-sep">&#x203A;</span>
    <span class="bc-cur">מבחן — צבע וטיפוגרפיה</span>
    <span class="bc-edit-tag">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="10" height="10"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      עריכה
    </span>
  </nav>
  <div class="tb-right">
    <button class="ib" onclick="toggleTheme()" title="ערכת נושא">
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
  <span id="toastText"></span>
</div>

<script>
/* ── Theme toggle ── */
function toggleTheme(){
  const html=document.documentElement;
  html.dataset.theme=html.dataset.theme==='dark'?'light':'dark';
}

/* ── Pass slider ── */
function updatePass(v){
  document.getElementById('passVal').textContent=v+'%';
  document.getElementById('passDisplay').textContent=v;
}

/* ── Toggle switch ── */
function toggleSwitch(el){el.classList.toggle('on');}

/* ── Time limit toggle ── */
function toggleTimeLimit(el){
  el.classList.toggle('on');
  document.getElementById('timeLimitInput').disabled=!el.classList.contains('on');
}

/* ── Mark correct answer ── */
function markCorrect(optEl){
  if(optEl.tagName==='INPUT'||optEl.tagName==='BUTTON')return;
  const card=optEl.closest('.q-card');
  card.querySelectorAll('.q-opt').forEach(o=>o.classList.remove('correct'));
  optEl.classList.add('correct');
}

/* ── Delete question ── */
function deleteQuestion(btn){
  const card=btn.closest('.q-card');
  card.classList.add('fade-out');
  card.style.transition='all .3s ease';
  card.style.maxHeight=card.offsetHeight+'px';
  requestAnimationFrame(()=>{
    card.style.maxHeight='0';card.style.opacity='0';card.style.marginBottom='0';card.style.padding='0';
  });
  setTimeout(()=>{
    card.remove();
    renumberQuestions();
    updateCount();
    showToast('השאלה נמחקה','success');
  },300);
}

/* ── Delete option ── */
function deleteOption(e,btn){
  e.stopPropagation();
  const opt=btn.closest('.q-opt');
  const card=opt.closest('.q-card');
  const opts=card.querySelectorAll('.q-opt');
  if(opts.length<=2){showToast('חייבות להיות לפחות 2 אפשרויות','info');return;}
  opt.style.transition='all .2s';opt.style.opacity='0';opt.style.transform='translateX(10px)';
  setTimeout(()=>opt.remove(),200);
}

/* ── Add option ── */
function addOption(btn){
  const card=btn.closest('.q-card');
  const optionsContainer=card.querySelector('.q-options');
  const newOpt=document.createElement('div');
  newOpt.className='q-opt';
  newOpt.onclick=function(){markCorrect(this);};
  newOpt.innerHTML=`
    <div class="q-radio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
    <input class="q-opt-text" type="text" value="" placeholder="הקלד תשובה...">
    <button class="q-opt-del" onclick="deleteOption(event,this)" title="מחק"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  `;
  newOpt.style.opacity='0';newOpt.style.transform='translateY(6px)';
  optionsContainer.appendChild(newOpt);
  requestAnimationFrame(()=>{newOpt.style.transition='all .2s';newOpt.style.opacity='1';newOpt.style.transform='translateY(0)';});
  newOpt.querySelector('input').focus();
}

/* ── Add question ── */
let qCounter=4;
const numColors=['q-num-1','q-num-2','q-num-3','q-num-4','q-num-5','q-num-6','q-num-7','q-num-8'];
function addQuestion(){
  qCounter++;
  const list=document.getElementById('questionsList');
  const num=list.querySelectorAll('.q-card').length+1;
  const colorClass=numColors[(num-1)%numColors.length];
  const padNum=String(num).padStart(2,'0');
  const card=document.createElement('div');
  card.className='q-card new-card';
  card.style.marginBottom='16px';
  card.dataset.q=num;
  card.innerHTML=`
    <button class="q-del" onclick="deleteQuestion(this)" title="מחק שאלה">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    </button>
    <div class="q-top">
      <div class="q-drag"><span><i></i><i></i></span><span><i></i><i></i></span><span><i></i><i></i></span></div>
      <div class="q-num ${colorClass}">${padNum}</div>
      <textarea class="q-text" rows="1" oninput="autoResize(this)" placeholder="הקלד שאלה..."></textarea>
    </div>
    <div class="q-options">
      <div class="q-opt" onclick="markCorrect(this)">
        <div class="q-radio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
        <input class="q-opt-text" type="text" value="" placeholder="תשובה א׳">
        <button class="q-opt-del" onclick="deleteOption(event,this)" title="מחק"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="q-opt" onclick="markCorrect(this)">
        <div class="q-radio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
        <input class="q-opt-text" type="text" value="" placeholder="תשובה ב׳">
        <button class="q-opt-del" onclick="deleteOption(event,this)" title="מחק"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="q-opt" onclick="markCorrect(this)">
        <div class="q-radio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
        <input class="q-opt-text" type="text" value="" placeholder="תשובה ג׳">
        <button class="q-opt-del" onclick="deleteOption(event,this)" title="מחק"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="q-opt" onclick="markCorrect(this)">
        <div class="q-radio"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
        <input class="q-opt-text" type="text" value="" placeholder="תשובה ד׳">
        <button class="q-opt-del" onclick="deleteOption(event,this)" title="מחק"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
    </div>
    <button class="q-add-opt" onclick="addOption(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      הוסף אפשרות
    </button>
  `;
  list.appendChild(card);
  updateCount();
  card.querySelector('.q-text').focus();
  card.scrollIntoView({behavior:'smooth',block:'center'});
}

/* ── Renumber questions ── */
function renumberQuestions(){
  const cards=document.querySelectorAll('#questionsList .q-card');
  cards.forEach((card,i)=>{
    const num=card.querySelector('.q-num');
    num.textContent=String(i+1).padStart(2,'0');
    num.className='q-num '+numColors[i%numColors.length];
  });
}

/* ── Update question count ── */
function updateCount(){
  const n=document.querySelectorAll('#questionsList .q-card').length;
  document.getElementById('qCount').textContent=n;
}

/* ── Auto-resize textarea ── */
function autoResize(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}

/* ── Toast ── */
let toastTimeout;
function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  const txt=document.getElementById('toastText');
  t.className='toast toast-'+type;
  txt.textContent=msg;
  if(type==='info'){
    t.querySelector('svg').innerHTML='<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>';
  } else {
    t.querySelector('svg').innerHTML='<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>';
  }
  clearTimeout(toastTimeout);
  requestAnimationFrame(()=>t.classList.add('show'));
  toastTimeout=setTimeout(()=>t.classList.remove('show'),2500);
}

/* ── Init textarea heights ── */
document.querySelectorAll('.q-text').forEach(autoResize);
</script>
</body>
</html>
